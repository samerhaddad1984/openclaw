{id:17,title:{en:"CPA Engagements",fr:"Mandats CPA"},role:"manager",
sections:[
{title:{en:"Engagement Types and Workflow",fr:"Types de mandats et processus"},
content:{en:"<p>LedgerLink supports three CPA engagement types:</p><table class='info-table'><tr><th>Type</th><th>Assurance Level</th><th>Key CAS Standards</th></tr><tr><td>Compilation</td><td>None</td><td>CSRS 4200</td></tr><tr><td>Review</td><td>Limited</td><td>CSRE 2400</td></tr><tr><td>Audit</td><td>Reasonable</td><td>CAS 200-810</td></tr></table><p><strong>Creating an engagement:</strong> Go to Engagements > Create. Set the client, period, type, planned hours, budget, and team members.</p><p><strong>Engagement completion checklist:</strong> Each engagement has a checklist that must be completed before issuance. Items include working papers, evidence, materiality, risk assessment, management representation letter, and more.</p>",
fr:"<p>LedgerLink supporte trois types de mandats CPA\u00a0:</p><table class='info-table'><tr><th>Type</th><th>Niveau d\u2019assurance</th><th>Normes NCA cl\u00e9s</th></tr><tr><td>Compilation</td><td>Aucun</td><td>NCSR 4200</td></tr><tr><td>Examen</td><td>Limit\u00e9</td><td>NCME 2400</td></tr><tr><td>Audit</td><td>Raisonnable</td><td>NCA 200-810</td></tr></table><p><strong>Cr\u00e9er un mandat\u00a0:</strong> Allez \u00e0 Mandats > Cr\u00e9er. D\u00e9finissez le client, la p\u00e9riode, le type, les heures pr\u00e9vues, le budget et les membres de l\u2019\u00e9quipe.</p><p><strong>Liste de contr\u00f4le d\u2019ach\u00e8vement\u00a0:</strong> Chaque mandat a une liste qui doit \u00eatre compl\u00e9t\u00e9e avant l\u2019\u00e9mission. Les \u00e9l\u00e9ments incluent les dossiers de travail, les preuves, la mat\u00e9rialit\u00e9, l\u2019\u00e9valuation des risques, la lettre de repr\u00e9sentation de la direction, et plus.</p>"}},
{title:{en:"Key CAS Standards in LedgerLink",fr:"Normes NCA cl\u00e9s dans LedgerLink"},
content:{en:"<ul><li><strong>CAS 320 \u2014 Materiality:</strong> Calculate materiality based on revenue, profit, or total assets. LedgerLink applies percentage thresholds and suggests performance materiality.</li><li><strong>CAS 315 \u2014 Risk Assessment:</strong> Risk matrix with inherent and control risk ratings by account. Auto-generates from chart of accounts.</li><li><strong>CAS 570 \u2014 Going Concern:</strong> Auto-detects indicators (losses, negative equity, loan defaults) when creating/updating engagements.</li><li><strong>CAS 560 \u2014 Subsequent Events:</strong> Auto-runs checks for events after year-end that may require disclosure.</li><li><strong>CAS 580 \u2014 Management Representation Letter:</strong> Bilingual template generated automatically. Requires client signature before engagement issuance.</li><li><strong>CAS 550 \u2014 Related Parties:</strong> Track related parties with ownership percentages. Generate disclosure text.</li><li><strong>CAS 700 \u2014 Audit Opinion:</strong> The engagement issuance process validates that all CAS requirements are met before generating the final report.</li></ul>",
fr:"<ul><li><strong>NCA 320 \u2014 Importance relative\u00a0:</strong> Calcul bas\u00e9 sur les revenus, le b\u00e9n\u00e9fice ou l\u2019actif total. LedgerLink applique des seuils en pourcentage et sugg\u00e8re l\u2019importance relative de r\u00e9f\u00e9rence.</li><li><strong>NCA 315 \u2014 \u00c9valuation des risques\u00a0:</strong> Matrice de risques avec risques inh\u00e9rents et de contr\u00f4le par compte.</li><li><strong>NCA 570 \u2014 Continuit\u00e9 d\u2019exploitation\u00a0:</strong> D\u00e9tection automatique des indicateurs (pertes, capitaux propres n\u00e9gatifs, d\u00e9fauts de pr\u00eat).</li><li><strong>NCA 560 \u2014 \u00c9v\u00e9nements post\u00e9rieurs\u00a0:</strong> V\u00e9rifications automatiques des \u00e9v\u00e9nements apr\u00e8s la fin d\u2019exercice.</li><li><strong>NCA 580 \u2014 Lettre de repr\u00e9sentation\u00a0:</strong> Mod\u00e8le bilingue g\u00e9n\u00e9r\u00e9 automatiquement. Signature du client requise.</li><li><strong>NCA 550 \u2014 Apparent\u00e9s\u00a0:</strong> Suivi des apparent\u00e9s avec pourcentages de propri\u00e9t\u00e9. G\u00e9n\u00e9ration de texte de divulgation.</li><li><strong>NCA 700 \u2014 Opinion d\u2019audit\u00a0:</strong> Le processus d\u2019\u00e9mission valide que toutes les exigences NCA sont satisfaites.</li></ul>"}}
],

// ─────────────────── MODULE 18 ───────────────────
{id:18,title:{en:"Quality Control",fr:"Contr\u00f4le de qualit\u00e9"},role:"manager",
sections:[
{title:{en:"Quality Control in LedgerLink",fr:"Contr\u00f4le de qualit\u00e9 dans LedgerLink"},
content:{en:"<p>Quality control is built into every layer of LedgerLink:</p><ul><li><strong>Automated controls:</strong> Fraud engine (13 rules), substance engine, tax validation, math verification, duplicate detection</li><li><strong>Concurrency controls:</strong> Optimistic locking prevents stale approvals. If a document changes after you load it, the system blocks your approval and forces a re-review.</li><li><strong>Manual journal collision detection:</strong> If someone creates a manual journal entry that duplicates an automated posting, LedgerLink quarantines the manual entry.</li><li><strong>Audit trail:</strong> Every action is logged \u2014 who did what, when, and why. Fraud override reasons are permanently locked.</li><li><strong>Working paper sign-off:</strong> Once a working paper is signed off, it becomes immutable (enforced by database trigger).</li><li><strong>Period locking:</strong> Prevents retroactive changes to closed periods.</li></ul><div class='tip'>The Analytics page (owner only) shows staff productivity metrics, client complexity scores, fraud flag statistics, and filing deadlines at risk.</div>",
fr:"<p>Le contr\u00f4le de qualit\u00e9 est int\u00e9gr\u00e9 dans chaque couche de LedgerLink\u00a0:</p><ul><li><strong>Contr\u00f4les automatis\u00e9s\u00a0:</strong> Moteur de fraude (13 r\u00e8gles), moteur de substance, validation fiscale, v\u00e9rification math\u00e9matique, d\u00e9tection de doublons</li><li><strong>Contr\u00f4les de concurrence\u00a0:</strong> Le verrouillage optimiste emp\u00eache les approbations p\u00e9rim\u00e9es. Si un document change apr\u00e8s le chargement, le syst\u00e8me bloque votre approbation.</li><li><strong>D\u00e9tection de collision d\u2019\u00e9critures manuelles\u00a0:</strong> Si quelqu\u2019un cr\u00e9e une \u00e9criture manuelle qui duplique une publication automatis\u00e9e, LedgerLink met en quarantaine l\u2019\u00e9criture manuelle.</li><li><strong>Piste de v\u00e9rification\u00a0:</strong> Chaque action est enregistr\u00e9e. Les raisons de d\u00e9rogation de fraude sont verrouill\u00e9es de fa\u00e7on permanente.</li><li><strong>Approbation des dossiers de travail\u00a0:</strong> Une fois approuv\u00e9, un dossier de travail devient immuable.</li><li><strong>Verrouillage de p\u00e9riode\u00a0:</strong> Emp\u00eache les changements r\u00e9troactifs aux p\u00e9riodes ferm\u00e9es.</li></ul>"}}
],
quiz:[
{q:{en:"What prevents approving a document that changed since you loaded it?",fr:"Qu\u2019est-ce qui emp\u00eache d\u2019approuver un document qui a chang\u00e9 depuis le chargement\u00a0?"},

{id:19,title:{en:"Filing Calendar",fr:"Calendrier de production"},role:"manager",
sections:[
{title:{en:"Managing Filing Deadlines",fr:"G\u00e9rer les \u00e9ch\u00e9ances de production"},
content:{en:"<p>The Filing Calendar tracks all recurring tax filing deadlines for every client. Configure each client\u2019s filing frequency (monthly, quarterly, annually), GST/QST registration status, and fiscal year end.</p><p><strong>Features:</strong></p><ul><li>View upcoming deadlines sorted by date</li><li>Mark filings as completed with the actual filing date</li><li>Analytics shows \u201cdeadlines at risk\u201d \u2014 filings approaching their due date without being marked complete</li><li>Color-coded: green = filed, yellow = approaching, red = overdue</li></ul>",
fr:"<p>Le calendrier de production suit toutes les \u00e9ch\u00e9ances r\u00e9currentes de production fiscale pour chaque client. Configurez la fr\u00e9quence de production (mensuelle, trimestrielle, annuelle), le statut d\u2019inscription TPS/TVQ et la fin d\u2019exercice.</p><p><strong>Fonctionnalit\u00e9s\u00a0:</strong></p><ul><li>Voir les \u00e9ch\u00e9ances \u00e0 venir tri\u00e9es par date</li><li>Marquer les productions comme compl\u00e9t\u00e9es avec la date r\u00e9elle</li><li>L\u2019analytique montre les \u00ab\u00a0\u00e9ch\u00e9ances \u00e0 risque\u00a0\u00bb</li><li>Code couleur\u00a0: vert = produit, jaune = approche, rouge = en retard</li></ul>"}}

{title:{en:"AI-Assisted Client Messaging",fr:"Messagerie client assist\u00e9e par IA"},
content:{en:"<p>The Communications page lets you draft and send messages to clients, with AI assistance for composing professional messages in the client\u2019s preferred language.</p><p><strong>Workflow:</strong></p><ol><li>Select the client</li><li>Describe what you need to communicate</li><li>LedgerLink\u2019s AI drafts a professional message</li><li>Review and edit the draft</li><li>Send via email (SMTP)</li></ol><p>All communications are logged. You can filter by client and view history of messages sent.</p>",
fr:"<p>La page Communications vous permet de r\u00e9diger et d\u2019envoyer des messages aux clients, avec assistance IA pour composer des messages professionnels dans la langue pr\u00e9f\u00e9r\u00e9e du client.</p><p><strong>Processus\u00a0:</strong></p><ol><li>S\u00e9lectionnez le client</li><li>D\u00e9crivez ce que vous devez communiquer</li><li>L\u2019IA de LedgerLink r\u00e9dige un message professionnel</li><li>R\u00e9visez et modifiez le brouillon</li><li>Envoyez par courriel (SMTP)</li></ol><p>Toutes les communications sont enregistr\u00e9es. Vous pouvez filtrer par client et voir l\u2019historique des messages envoy\u00e9s.</p>"}}

// ─────────────────── MODULE 21 ───────────────────
{id:21,title:{en:"Vendor Aliases and Learning",fr:"Alias de fournisseurs et apprentissage"},role:"all",
sections:[
{title:{en:"How Vendor Learning Works",fr:"Comment fonctionne l\u2019apprentissage des fournisseurs"},
content:{en:"<p>LedgerLink learns from your corrections. When you change a vendor\u2019s GL account, tax code, or category, the system remembers this pattern with a confidence score. Next time the same vendor appears, LedgerLink suggests the learned values.</p><p><strong>Vendor aliases:</strong> Vendors may appear under different names (e.g., \u201cTELUS\u201d, \u201cTELUS Communications\u201d, \u201cTelus Mobility\u201d). The Vendor Aliases page (owner only) lets you create synonyms so all variations map to a canonical name.</p><p><strong>Learning history:</strong> Every document\u2019s detail page shows its learning history \u2014 what was changed, by whom, and when. This creates a full audit trail of corrections.</p><div class='warning'>Vendor memory is per-client. Corrections for Client A do not affect Client B\u2019s vendor suggestions. This protects CPA independence.</div>",
fr:"<p>LedgerLink apprend de vos corrections. Quand vous changez le compte GL, le code de taxe ou la cat\u00e9gorie d\u2019un fournisseur, le syst\u00e8me m\u00e9morise ce sch\u00e9ma avec un score de confiance. La prochaine fois que le m\u00eame fournisseur appara\u00eet, LedgerLink sugg\u00e8re les valeurs apprises.</p><p><strong>Alias de fournisseurs\u00a0:</strong> Les fournisseurs peuvent appara\u00eetre sous diff\u00e9rents noms (ex. \u00ab\u00a0TELUS\u00a0\u00bb, \u00ab\u00a0TELUS Communications\u00a0\u00bb, \u00ab\u00a0Telus Mobilit\u00e9\u00a0\u00bb). La page Alias de fournisseurs (propri\u00e9taire seulement) permet de cr\u00e9er des synonymes pour que toutes les variations correspondent \u00e0 un nom canonique.</p><p><strong>Historique d\u2019apprentissage\u00a0:</strong> La page de d\u00e9tail de chaque document montre son historique d\u2019apprentissage \u2014 ce qui a \u00e9t\u00e9 chang\u00e9, par qui et quand.</p><div class='warning'>La m\u00e9moire fournisseur est par client. Les corrections pour le Client A n\u2019affectent pas les suggestions du Client B. Cela prot\u00e8ge l\u2019ind\u00e9pendance CPA.</div>"}}
],
quiz:[
{q:{en:"Vendor learning is scoped to:",fr:"L\u2019apprentissage fournisseur est limit\u00e9 \u00e0\u00a0:"},
opts:{en:["All clients","Per client","Per user","Per document"],fr:["Tous les clients","Par client","Par utilisateur","Par document"]},ans:1},
{q:{en:"Who can manage vendor aliases?",fr:"Qui peut g\u00e9rer les alias de fournisseurs\u00a0?"},

opts:{en:["GL account, tax code, and category corrections","Only amounts","Only dates","Client preferences"],fr:["Corrections de compte GL, code de taxe et cat\u00e9gorie","Seulement les montants","Seulement les dates","Pr\u00e9f\u00e9rences client"]},ans:0},
{q:{en:"Why is vendor memory per-client?",fr:"Pourquoi la m\u00e9moire fournisseur est-elle par client\u00a0?"},

{q:{en:"Where do you see a document\u2019s correction history?",fr:"O\u00f9 voyez-vous l\u2019historique de correction d\u2019un document\u00a0?"},

]

// ─────────────────── MODULE 22 ───────────────────
{id:22,title:{en:"Manual Journal Entries",fr:"\u00c9critures de journal manuelles"},role:"manager",
sections:[
{title:{en:"Creating and Managing Journal Entries",fr:"Cr\u00e9er et g\u00e9rer les \u00e9critures de journal"},
content:{en:"<p>Manual journal entries (MJEs) are used for adjustments that don\u2019t come from document processing \u2014 accruals, reclassifications, corrections, etc.</p><p><strong>Workflow:</strong></p><ol><li>Go to <strong>Journal Entries</strong></li><li>Select client, date, and description</li><li>Enter debit and credit accounts with amounts</li><li>Save as <strong>Draft</strong></li><li>Post when ready \u2014 status changes to <strong>Posted</strong></li><li>If needed, reverse \u2014 status changes to <strong>Reversed</strong></li></ol><p><strong>Safety features:</strong></p><ul><li><strong>Conflict detection:</strong> If the same account has a pending automated posting, the MJE is blocked to prevent double-posting</li><li><strong>Phantom tax detection:</strong> If you post to an ITC/ITR account but the client is not GST/QST registered, the entry is blocked</li></ul>",
fr:"<p>Les \u00e9critures de journal manuelles (EJM) sont utilis\u00e9es pour les ajustements qui ne proviennent pas du traitement de documents \u2014 r\u00e9gularisations, reclassements, corrections, etc.</p><p><strong>Processus\u00a0:</strong></p><ol><li>Allez \u00e0 <strong>\u00c9critures de journal</strong></li><li>S\u00e9lectionnez le client, la date et la description</li><li>Entrez les comptes d\u00e9bit et cr\u00e9dit avec les montants</li><li>Enregistrez comme <strong>Brouillon</strong></li><li>Publiez quand pr\u00eat \u2014 le statut change \u00e0 <strong>Publi\u00e9</strong></li><li>Si n\u00e9cessaire, contrepassez \u2014 le statut change \u00e0 <strong>Contrepass\u00e9</strong></li></ol><p><strong>Fonctions de s\u00e9curit\u00e9\u00a0:</strong></p><ul><li><strong>D\u00e9tection de conflit\u00a0:</strong> Si le m\u00eame compte a une publication automatis\u00e9e en attente, l\u2019EJM est bloqu\u00e9e</li><li><strong>D\u00e9tection de taxe fant\u00f4me\u00a0:</strong> Si vous publiez vers un compte CTI/RTI mais le client n\u2019est pas inscrit TPS/TVQ, l\u2019\u00e9criture est bloqu\u00e9e</li></ul>"}}
],

// ─────────────────── MODULE 23 ───────────────────
{id:23,title:{en:"System Administration",fr:"Administration du syst\u00e8me"},role:"owner",
sections:[
{title:{en:"Owner Administration Tools",fr:"Outils d\u2019administration du propri\u00e9taire"},
content:{en:"<p>Owner-only administration features:</p><ul><li><strong>User Management (/users):</strong> Create, deactivate, and reset passwords for staff accounts. Assign roles (employee, manager, owner).</li><li><strong>Troubleshoot (/troubleshoot):</strong> View system health \u2014 folder watcher status, OpenClaw bridge status, Cloudflare tunnel status. Download database backup. Restart services.</li><li><strong>Cache Management (/admin/cache):</strong> View AI response cache statistics. Clear cache when needed.</li><li><strong>Updates (/admin/updates):</strong> Check for new software versions. Install updates.</li><li><strong>Remote Management (/admin/remote):</strong> Restart the service, create backups, trigger updates, run diagnostics/autofix remotely.</li><li><strong>License (/license):</strong> Activate and manage license key. View tier (Essentiel, Professionnel, Cabinet, Entreprise) and limits. Register machines (max 3 per license).</li></ul>",
fr:"<p>Fonctionnalit\u00e9s d\u2019administration r\u00e9serv\u00e9es au propri\u00e9taire\u00a0:</p><ul><li><strong>Gestion des utilisateurs (/users)\u00a0:</strong> Cr\u00e9er, d\u00e9sactiver et r\u00e9initialiser les mots de passe des comptes du personnel. Attribuer des r\u00f4les.</li><li><strong>D\u00e9pannage (/troubleshoot)\u00a0:</strong> Voir la sant\u00e9 du syst\u00e8me. T\u00e9l\u00e9charger la sauvegarde de la base de donn\u00e9es. Red\u00e9marrer les services.</li><li><strong>Gestion du cache (/admin/cache)\u00a0:</strong> Voir les statistiques du cache de r\u00e9ponse IA. Vider le cache.</li><li><strong>Mises \u00e0 jour (/admin/updates)\u00a0:</strong> V\u00e9rifier les nouvelles versions. Installer les mises \u00e0 jour.</li><li><strong>Gestion \u00e0 distance (/admin/remote)\u00a0:</strong> Red\u00e9marrer le service, cr\u00e9er des sauvegardes, d\u00e9clencher des mises \u00e0 jour, ex\u00e9cuter des diagnostics.</li><li><strong>Licence (/license)\u00a0:</strong> Activer et g\u00e9rer la cl\u00e9 de licence. Voir le niveau et les limites. Enregistrer les machines (max 3 par licence).</li></ul>"}}

// ─────────────────── MODULE 24 ───────────────────
{id:24,title:{en:"Security Best Practices",fr:"Bonnes pratiques de s\u00e9curit\u00e9"},role:"all",
sections:[
{title:{en:"Security Features and Best Practices",fr:"Fonctionnalit\u00e9s de s\u00e9curit\u00e9 et bonnes pratiques"},
content:{en:"<p>LedgerLink has multiple security layers. Follow these best practices:</p><ul><li><strong>Passwords:</strong> Use strong passwords (8+ characters, uppercase, digit). Never share passwords. Change temporary passwords immediately.</li><li><strong>Sessions:</strong> Sessions expire after 12 hours. Always log out when leaving your workstation.</li><li><strong>Rate limiting:</strong> 5 failed login attempts lock the IP for 15 minutes. Don\u2019t share login attempts across colleagues.</li><li><strong>Role-based access:</strong> Employees cannot access admin, financial, or audit features. Request role upgrades from the owner.</li><li><strong>Audit trail:</strong> Everything is logged. Fraud overrides are permanently locked. Working paper sign-offs are immutable.</li><li><strong>Data backup:</strong> Regular backups are configured in setup (daily/weekly). The owner can download manual backups from Troubleshoot.</li><li><strong>HTTPS:</strong> When accessing over the network, ensure HTTPS is enabled (configured in security settings). Cookies are marked Secure and HttpOnly.</li><li><strong>API keys:</strong> Never share AI provider API keys. They are stored in the config file, not in the database.</li></ul><div class='warning'>If you suspect unauthorized access, immediately notify the system owner. Check the login attempt log in the database for suspicious activity.</div>",
fr:"<p>LedgerLink a plusieurs couches de s\u00e9curit\u00e9. Suivez ces bonnes pratiques\u00a0:</p><ul><li><strong>Mots de passe\u00a0:</strong> Utilisez des mots de passe forts (8+ caract\u00e8res, majuscule, chiffre). Ne partagez jamais les mots de passe.</li><li><strong>Sessions\u00a0:</strong> Les sessions expirent apr\u00e8s 12 heures. D\u00e9connectez-vous toujours en quittant votre poste.</li><li><strong>Limitation de d\u00e9bit\u00a0:</strong> 5 tentatives \u00e9chou\u00e9es bloquent l\u2019IP pour 15 minutes.</li><li><strong>Acc\u00e8s bas\u00e9 sur les r\u00f4les\u00a0:</strong> Les employ\u00e9s n\u2019ont pas acc\u00e8s aux fonctions admin, financi\u00e8res ou d\u2019audit.</li><li><strong>Piste de v\u00e9rification\u00a0:</strong> Tout est enregistr\u00e9. Les d\u00e9rogations de fraude sont verrouill\u00e9es. Les approbations de dossiers de travail sont immuables.</li><li><strong>Sauvegarde\u00a0:</strong> Les sauvegardes r\u00e9guli\u00e8res sont configur\u00e9es (quotidienne/hebdomadaire).</li><li><strong>HTTPS\u00a0:</strong> Assurez-vous que HTTPS est activ\u00e9 lors de l\u2019acc\u00e8s r\u00e9seau. Les cookies sont marqu\u00e9s Secure et HttpOnly.</li><li><strong>Cl\u00e9s API\u00a0:</strong> Ne partagez jamais les cl\u00e9s API des fournisseurs IA.</li></ul>"}}
],

// ============================================================
//  APPLICATION STATE & PERSISTENCE
// ============================================================
const STORAGE_KEY = 'ledgerlink_training_v2';
let state = loadState();

function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(s && s.version === 2) return s;
  }catch(e){}
  return {version:2,lang:'en',completed:{},quizScores:{},userName:''};
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function t(key){return I18N[state.lang][key]||key;}

// ============================================================
//  LANGUAGE TOGGLE
// ============================================================
function toggleLang(){
  state.lang = state.lang === 'en' ? 'fr' : 'en';
  saveState();
  document.documentElement.lang = state.lang;
  document.documentElement.setAttribute('data-lang', state.lang);
  document.getElementById('langBtn').textContent = state.lang === 'en' ? 'FR' : 'EN';
  // Re-render
  renderSidebar();
  const active = document.querySelector('.sidebar a.active');
  const mid = active ? active.getAttribute('data-module') : null;
  if(mid && mid !== 'home'){
    showModule(parseInt(mid));
  } else {
    renderHome();
  }
  updateHeaderProgress();
  updateI18nElements();
}

function updateI18nElements(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(I18N[state.lang][key]) el.textContent = I18N[state.lang][key];
  });
}

// ============================================================
//  PROGRESS
// ============================================================
function getCompletedCount(){ return Object.keys(state.completed).length; }

function updateHeaderProgress(){
  const c = getCompletedCount();
  document.getElementById('headerProgress').textContent = c + ' / 25';
  const pct = Math.round(c/25*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressText').innerHTML = c + ' / 25 ' + t('modules_complete');
  // Certificate check
  if(c === 25 && state.userName){
    showCertificate();
  }
}

function showCertificate(){
  const cert = document.getElementById('certificate');
  cert.classList.add('visible');
  document.getElementById('certName').textContent = state.userName;
  document.getElementById('certDate').textContent = new Date().toLocaleDateString(state.lang === 'fr' ? 'fr-CA' : 'en-CA',{year:'numeric',month:'long',day:'numeric'});
}

// ============================================================
//  SIDEBAR
// ============================================================
function renderSidebar(){
  const sb = document.getElementById('sidebar');
  let html = '<div class="sidebar-section">' + t('nav_modules') + '</div>';
  html += '<a href="#home" data-module="home" onclick="showHome(event)" class="active"><span class="status-dot none"></span> ' + t('nav_home') + '</a>';
  MODULES.forEach(m=>{
    const done = state.completed[m.id];
    const cls = done ? 'done' : (state.quizScores[m.id] !== undefined ? 'partial' : 'none');
    html += '<a href="#m'+m.id+'" data-module="'+m.id+'" onclick="showModule('+m.id+',event)"><span class="status-dot '+cls+'"></span> '+m.id+'. '+(m.title[state.lang]||m.title.en)+'</a>';
  });
  // Certificate link
  html += '<div class="sidebar-section" style="margin-top:16px">' + (state.lang==='fr'?'CERTIFICAT':'CERTIFICATE') + '</div>';
  html += '<a href="#cert" onclick="scrollToCert(event)"><span class="status-dot '+(getCompletedCount()===25?'done':'none')+'"></span> '+(state.lang==='fr'?'Voir le certificat':'View Certificate')+'</a>';
  sb.innerHTML = html;
}

function setActiveSidebar(mid){
  document.querySelectorAll('.sidebar a').forEach(a=>{
    a.classList.toggle('active', a.getAttribute('data-module') == mid);
  });
}

// ============================================================
//  HOME SCREEN
// ============================================================
function renderHome(){
  document.getElementById('homeScreen').style.display = 'block';
  document.getElementById('moduleContainer').style.display = 'none';
  setActiveSidebar('home');
  const grid = document.getElementById('homeGrid');
  let html = '';
  // Name input
  html += '<div style="grid-column:1/-1;background:#fff;border-radius:12px;padding:16px 20px;box-shadow:var(--shadow);margin-bottom:8px"><label style="font-size:13px;font-weight:600;color:var(--gray-700)">'+(state.lang==='fr'?'Votre nom (pour le certificat)':'Your name (for certificate)')+'</label><div style="display:flex;gap:8px;margin-top:6px"><input type="text" id="nameInput" value="'+(state.userName||'')+'" placeholder="'+t('q_placeholder')+'" style="flex:1;padding:8px 12px;border:1px solid var(--gray-300);border-radius:6px;font-size:14px"><button onclick="saveName()" style="background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">'+t('btn_save_name')+'</button></div></div>';
  MODULES.forEach(m=>{
    const done = state.completed[m.id];
    const partial = !done && state.quizScores[m.id] !== undefined;
    const statusCls = done ? 'done' : (partial ? 'inprog' : 'todo');
    const statusText = done ? t('status_done') : (partial ? t('status_inprog') : t('status_todo'));
    const roleLabel = m.role === 'all' ? t('all_staff') : (m.role === 'manager' ? t('manager_plus') : t('owner_only'));
    html += '<div class="home-card" onclick="showModule('+m.id+')"><h3>'+m.id+'. '+(m.title[state.lang]||m.title.en)+'</h3><p>'+roleLabel+'</p><span class="home-status '+statusCls+'">'+statusText+'</span></div>';
  });
  grid.innerHTML = html;
}

function saveName(){
  state.userName = document.getElementById('nameInput').value.trim();
  saveState();
  if(getCompletedCount() === 25 && state.userName) showCertificate();
}

function showHome(e){
  if(e) e.preventDefault();
  renderHome();
  window.scrollTo(0,0);
}

// ============================================================
//  MODULE RENDERING
// ============================================================
function showModule(id, e){
  if(e) e.preventDefault();
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('moduleContainer').style.display = 'block';
  setActiveSidebar(id);
  // Close mobile menu
  document.querySelector('.sidebar').classList.remove('mobile-open');

  const m = MODULES.find(x=>x.id===id);
  if(!m) return;

  const roleLabel = m.role === 'all' ? t('all_staff') : (m.role === 'manager' ? t('manager_plus') : t('owner_only'));
  const roleCls = m.role === 'all' ? 'badge-all' : (m.role === 'manager' ? 'badge-manager' : 'badge-owner');

  let html = '<div class="module-card open">';
  html += '<div class="module-header"><h2>'+t('nav_modules')+' '+m.id+': '+(m.title[state.lang]||m.title.en)+'</h2><div class="tags"><span class="badge '+roleCls+'">'+roleLabel+'</span>';
  if(state.completed[m.id]) html += '<span class="badge badge-complete">'+t('status_done')+'</span>';
  html += '</div></div>';
  html += '<div class="module-body" style="display:block">';

  // Sections
  m.sections.forEach((s,i)=>{
    html += '<div class="section"><h3><span class="num">'+(i+1)+'</span> '+(s.title[state.lang]||s.title.en)+'</h3>';
    html += (s.content[state.lang]||s.content.en);
    html += '</div>';
  });

  // Quiz
  if(m.quiz && m.quiz.length){
    html += '<div class="quiz-section" id="quiz-'+m.id+'">';
    html += '<h3>'+t('quiz_title')+' \u2014 '+(m.title[state.lang]||m.title.en)+'</h3>';
    m.quiz.forEach((q,qi)=>{
      html += '<div class="quiz-q" id="qq-'+m.id+'-'+qi+'">';
      html += '<p class="q-text">'+(qi+1)+'. '+(q.q[state.lang]||q.q.en)+'</p>';
      const opts = q.opts[state.lang]||q.opts.en;
      opts.forEach((o,oi)=>{
        html += '<label><input type="radio" name="q'+m.id+'_'+qi+'" value="'+oi+'"> '+o+'</label>';
      });
      html += '<div class="quiz-feedback" id="qf-'+m.id+'-'+qi+'"></div>';
      html += '</div>';
    });
    html += '<button class="quiz-submit" onclick="checkQuiz('+m.id+')">'+t('quiz_check')+'</button>';
    html += '<div class="quiz-result" id="qr-'+m.id+'"></div>';
    html += '</div>';
  }

  html += '</div></div>';

  // Navigation
  html += '<div style="display:flex;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:8px">';
  if(m.id > 1){
    html += '<button onclick="showModule('+(m.id-1)+')" style="background:var(--gray-200);border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px">&larr; '+t('prev_module')+'</button>';
  } else {
    html += '<span></span>';
  }
  html += '<button onclick="showHome()" style="background:var(--gray-200);border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px">'+t('back_home')+'</button>';
  if(m.id < 25){
    html += '<button onclick="showModule('+(m.id+1)+')" style="background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px">'+t('next_module')+' &rarr;</button>';
  } else {
    html += '<span></span>';
  }
  html += '</div>';

  document.getElementById('moduleContainer').innerHTML = html;
  window.scrollTo(0,0);
}

// ============================================================
//  QUIZ CHECKING
// ============================================================
function checkQuiz(mid){
  const m = MODULES.find(x=>x.id===mid);
  if(!m || !m.quiz) return;
  let correct = 0;
  const total = m.quiz.length;

  m.quiz.forEach((q,qi)=>{
    const selected = document.querySelector('input[name="q'+mid+'_'+qi+'"]:checked');
    const fb = document.getElementById('qf-'+mid+'-'+qi);
    if(!selected){
      fb.className = 'quiz-feedback wrong';
      fb.style.display = 'block';
      fb.textContent = t('quiz_wrong') + ' ' + (state.lang==='fr'?'Veuillez s\u00e9lectionner une r\u00e9ponse.':'Please select an answer.');
      return;
    }
    const val = parseInt(selected.value);
    if(val === q.ans){
      correct++;
      fb.className = 'quiz-feedback correct';
      fb.style.display = 'block';
      fb.textContent = t('quiz_correct');
    } else {
      fb.className = 'quiz-feedback wrong';
      fb.style.display = 'block';
      fb.textContent = t('quiz_wrong');
    }
  });

  const pct = Math.round(correct/total*100);
  state.quizScores[mid] = pct;
  const result = document.getElementById('qr-'+mid);

  if(pct >= 80){
    state.completed[mid] = true;
    result.className = 'quiz-result pass';
    result.style.display = 'block';
    result.textContent = t('quiz_pass') + ' (' + correct + '/' + total + ' = ' + pct + '%)';
  } else {
    delete state.completed[mid];
    result.className = 'quiz-result fail';
    result.style.display = 'block';
    result.textContent = t('quiz_fail') + ' (' + correct + '/' + total + ' = ' + pct + '%)';
  }
  saveState();
  updateHeaderProgress();
  renderSidebar();
  setActiveSidebar(mid);
}

// ============================================================
//  CERTIFICATE SCROLL
// ============================================================
function scrollToCert(e){
  if(e) e.preventDefault();
  if(getCompletedCount() === 25){
    if(!state.userName){
      showHome();
      setTimeout(()=>document.getElementById('nameInput')?.focus(), 200);
      return;
    }
    showCertificate();
    document.getElementById('homeScreen').style.display = 'block';
    document.getElementById('moduleContainer').style.display = 'none';
    setTimeout(()=>document.getElementById('certificate').scrollIntoView({behavior:'smooth'}), 100);
  } else {
    showHome();
  }
}

// ============================================================
//  INIT
// ============================================================
document.documentElement.lang = state.lang;
document.documentElement.setAttribute('data-lang', state.lang);
document.getElementById('langBtn').textContent = state.lang === 'en' ? 'FR' : 'EN';
renderSidebar();
renderHome();
updateHeaderProgress();
updateI18nElements();
</script>
