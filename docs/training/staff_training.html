<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LedgerLink AI — Staff Training System</title>
<style>
:root{--primary:#1e3a5f;--accent:#2563eb;--accent-light:#3b82f6;--green:#059669;--green-bg:#d1fae5;--green-text:#065f46;--yellow-bg:#fef3c7;--yellow-text:#92400e;--red-bg:#fee2e2;--red-text:#991b1b;--blue-bg:#eff6ff;--blue-text:#1e40af;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 4px 12px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--gray-100);color:var(--gray-900);line-height:1.6;font-size:15px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

/* Header */
.site-header{background:linear-gradient(135deg,#1e3a5f 0%,#1e40af 50%,#2563eb 100%);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.site-header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.site-header h1 span{opacity:.7;font-weight:400;font-size:14px;margin-left:8px}
.header-actions{display:flex;align-items:center;gap:12px}
.lang-toggle{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:background .2s}
.lang-toggle:hover{background:rgba(255,255,255,.25)}
.header-progress{font-size:13px;opacity:.85}

/* Navigation sidebar + main layout */
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:280px;background:#fff;border-right:1px solid var(--gray-200);padding:16px 0;overflow-y:auto;position:sticky;top:60px;height:calc(100vh - 60px);flex-shrink:0}
.sidebar-section{padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gray-500);letter-spacing:.5px;margin-top:8px}
.sidebar a{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--gray-700);transition:all .15s;border-left:3px solid transparent}
.sidebar a:hover{background:var(--gray-50);text-decoration:none;color:var(--accent)}
.sidebar a.active{background:var(--blue-bg);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.sidebar a .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar a .status-dot.done{background:var(--green)}
.sidebar a .status-dot.partial{background:#f59e0b}
.sidebar a .status-dot.none{background:var(--gray-300)}
.main-content{flex:1;padding:24px 32px;max-width:900px}

/* Progress bar */
.progress-overview{background:#fff;border-radius:var(--radius);padding:20px;margin-bottom:24px;box-shadow:var(--shadow)}
.progress-overview h2{font-size:16px;margin-bottom:8px}
.progress-bar-outer{background:var(--gray-200);height:10px;border-radius:5px;overflow:hidden;margin-bottom:8px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:5px;transition:width .6s ease}
.progress-stats{display:flex;justify-content:space-between;font-size:13px;color:var(--gray-500)}

/* Module card */
.module-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;transition:box-shadow .2s}
.module-card:hover{box-shadow:var(--shadow-lg)}
.module-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;gap:12px}
.module-header h2{font-size:16px;font-weight:600;color:var(--primary);flex:1}
.module-header .tags{display:flex;gap:6px;flex-shrink:0}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;white-space:nowrap}
.badge-all{background:var(--green-bg);color:var(--green-text)}
.badge-manager{background:var(--yellow-bg);color:var(--yellow-text)}
.badge-owner{background:var(--red-bg);color:var(--red-text)}
.badge-complete{background:var(--green-bg);color:var(--green-text)}
.chevron{transition:transform .3s;font-size:18px;color:var(--gray-500);flex-shrink:0}
.module-card.open .chevron{transform:rotate(180deg)}
.module-body{display:none;padding:0 20px 20px;border-top:1px solid var(--gray-200)}
.module-card.open .module-body{display:block}

/* Content sections */
.section{padding:16px 0;border-bottom:1px solid var(--gray-100)}
.section:last-of-type{border-bottom:none}
.section h3{font-size:15px;font-weight:600;color:var(--primary);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section h3 .num{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.section p,.section li{font-size:14px;color:var(--gray-700);margin-bottom:6px}
.section ul,.section ol{padding-left:24px;margin-bottom:8px}
.section li{margin-bottom:4px}
.tip{background:var(--blue-bg);border-left:3px solid var(--accent);padding:10px 14px;margin:10px 0;font-size:13px;color:var(--blue-text);border-radius:0 8px 8px 0}
.warning{background:var(--red-bg);border-left:3px solid #ef4444;padding:10px 14px;margin:10px 0;font-size:13px;color:var(--red-text);border-radius:0 8px 8px 0}
.key-point{background:var(--yellow-bg);border-left:3px solid #f59e0b;padding:10px 14px;margin:10px 0;font-size:13px;color:var(--yellow-text);border-radius:0 8px 8px 0}
table.info-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
table.info-table th{background:var(--gray-50);text-align:left;padding:8px 12px;border:1px solid var(--gray-200);font-weight:600}
table.info-table td{padding:8px 12px;border:1px solid var(--gray-200)}

/* Quiz */
.quiz-section{background:#f0fdf4;border-radius:8px;padding:18px;margin-top:16px}
.quiz-section h3{font-size:15px;font-weight:600;color:#166534;margin-bottom:12px}
.quiz-q{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #bbf7d0}
.quiz-q:last-of-type{border-bottom:none;padding-bottom:0;margin-bottom:0}
.quiz-q p.q-text{font-size:14px;font-weight:600;color:#166534;margin-bottom:8px}
.quiz-q label{display:block;padding:6px 10px;font-size:13px;cursor:pointer;border-radius:6px;margin-bottom:3px;transition:background .15s}
.quiz-q label:hover{background:#dcfce7}
.quiz-q input[type="radio"]{margin-right:8px;accent-color:var(--green)}
.quiz-feedback{display:none;margin-top:8px;padding:8px 12px;border-radius:6px;font-size:13px;font-weight:500}
.quiz-feedback.correct{display:block;background:#d1fae5;color:#065f46}
.quiz-feedback.wrong{display:block;background:#fee2e2;color:#991b1b}
.quiz-submit{background:var(--green);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;margin-top:10px;transition:background .2s}
.quiz-submit:hover{background:#047857}
.quiz-result{margin-top:12px;padding:12px;border-radius:8px;font-size:14px;font-weight:600;display:none}
.quiz-result.pass{display:block;background:#d1fae5;color:#065f46}
.quiz-result.fail{display:block;background:#fef3c7;color:#92400e}

/* Certificate */
.certificate-section{display:none;background:#fff;border:3px solid var(--accent);border-radius:var(--radius);padding:40px;text-align:center;margin:24px 0}
.certificate-section.visible{display:block}
.certificate-section h2{font-size:24px;color:var(--primary);margin-bottom:8px}
.certificate-section .cert-line{font-size:14px;color:var(--gray-500);margin-bottom:4px}
.certificate-section .cert-name{font-size:28px;font-weight:700;color:var(--accent);margin:16px 0}
.certificate-section .cert-date{font-size:13px;color:var(--gray-500);margin-top:12px}
.print-btn{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin-top:16px;transition:background .2s}
.print-btn:hover{background:#1d4ed8}

/* Home screen */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px}
.home-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;border-left:4px solid var(--accent)}
.home-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.home-card h3{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:4px}
.home-card p{font-size:12px;color:var(--gray-500)}
.home-card .home-status{font-size:11px;font-weight:600;margin-top:8px;padding:3px 8px;border-radius:10px;display:inline-block}
.home-card .home-status.done{background:var(--green-bg);color:var(--green-text)}
.home-card .home-status.inprog{background:var(--yellow-bg);color:var(--yellow-text)}
.home-card .home-status.todo{background:var(--gray-100);color:var(--gray-500)}

/* Responsive */
@media(max-width:768px){
.sidebar{display:none}
.main-content{padding:16px}
.site-header{padding:12px 16px}
.site-header h1{font-size:16px}
.site-header h1 span{display:none}
.module-header h2{font-size:14px}
.certificate-section{padding:24px 16px}
.home-grid{grid-template-columns:1fr}
}
.mobile-menu-btn{display:none;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
@media(max-width:768px){
.mobile-menu-btn{display:block}
.sidebar.mobile-open{display:block;position:fixed;top:60px;left:0;z-index:99;width:280px;box-shadow:4px 0 12px rgba(0,0,0,.2)}
}

/* Print */
@media print{
.site-header,.sidebar,.progress-overview,.quiz-section,.print-btn,.header-actions,.mobile-menu-btn{display:none!important}
.module-body{display:block!important}
.certificate-section{display:block!important;border:2px solid #000;page-break-inside:avoid}
.module-card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}
body{background:#fff}
}
</style>
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header class="site-header">
<h1>
<button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open')">&#9776;</button>
LedgerLink AI<span data-i18n="header_sub"> &mdash; Staff Training System</span>
</h1>
<div class="header-actions">
<span class="header-progress" id="headerProgress">0 / 25</span>
<button class="lang-toggle" onclick="toggleLang()" id="langBtn">FR</button>
</div>
</header>

<!-- ==================== LAYOUT ==================== -->
<div class="layout">

<!-- Sidebar Navigation -->
<nav class="sidebar" id="sidebar">
<div class="sidebar-section" data-i18n="nav_modules">MODULES</div>
<a href="#home" class="active" onclick="showHome(event)"><span class="status-dot none"></span> <span data-i18n="nav_home">Home</span></a>
</nav>

<!-- Main Content -->
<div class="main-content" id="mainContent">

<!-- HOME SCREEN -->
<div id="homeScreen">
<div class="progress-overview">
<h2 data-i18n="progress_title">Training Progress</h2>
<div class="progress-bar-outer"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
<div class="progress-stats">
<span id="progressText">0 / 25 <span data-i18n="modules_complete">modules complete</span></span>
<span id="progressPct">0%</span>
</div>
</div>
<div class="home-grid" id="homeGrid"></div>
</div>

<!-- MODULE CONTAINER (populated by JS) -->
<div id="moduleContainer" style="display:none"></div>

<!-- CERTIFICATE -->
<div class="certificate-section" id="certificate">
<p style="font-size:40px;margin-bottom:8px">&#127942;</p>
<h2 data-i18n="cert_title">Certificate of Completion</h2>
<p class="cert-line" data-i18n="cert_line1">This certifies that</p>
<p class="cert-name" id="certName"></p>
<p class="cert-line" data-i18n="cert_line2">has successfully completed all 25 modules of the</p>
<p class="cert-line" style="font-weight:700;font-size:18px;color:var(--primary)">LedgerLink AI Staff Training Program</p>
<p class="cert-date" id="certDate"></p>
<button class="print-btn" onclick="window.print()" data-i18n="cert_print">Print Certificate</button>
</div>

</div><!-- /main-content -->
</div><!-- /layout -->

<!-- ==================== DATA + LOGIC ==================== -->
<script>

//  BILINGUAL STRINGS
// ============================================================
const I18N = {

}
};

// ============================================================
//  25 TRAINING MODULES — FULL CONTENT
// ============================================================
const MODULES = [
// ─────────────────── MODULE 1 ───────────────────
{
id:1,
title:{en:"System Overview",fr:"Vue d\u2019ensemble du syst\u00e8me"},
role:"all",
sections:[
{title:{en:"What LedgerLink Is",fr:"Qu\u2019est-ce que LedgerLink"},
content:{
en:"<p>LedgerLink AI is a complete bookkeeping automation platform built for Canadian accounting firms, especially those operating in Quebec. It receives invoices, receipts and bank statements through multiple channels (email, WhatsApp, Telegram, client portal, folder watcher), extracts data using AI-powered OCR, applies deterministic tax and fraud rules, and prepares entries for posting to QuickBooks Online.</p><p>The system is designed so that <strong>AI handles the repetitive work</strong> while <strong>humans make the final decisions</strong>. Every document passes through a review queue before it can be posted.</p>",
fr:"<p>LedgerLink AI est une plateforme compl\u00e8te d\u2019automatisation de la tenue de livres con\u00e7ue pour les cabinets comptables canadiens, particuli\u00e8rement ceux op\u00e9rant au Qu\u00e9bec. Il re\u00e7oit les factures, re\u00e7us et relev\u00e9s bancaires par plusieurs canaux (courriel, WhatsApp, Telegram, portail client, surveillance de dossier), extrait les donn\u00e9es par OCR assist\u00e9 par IA, applique des r\u00e8gles d\u00e9terministes de taxes et de fraude, et pr\u00e9pare les \u00e9critures pour publication dans QuickBooks Online.</p><p>Le syst\u00e8me est con\u00e7u pour que <strong>l\u2019IA g\u00e8re le travail r\u00e9p\u00e9titif</strong> tandis que <strong>les humains prennent les d\u00e9cisions finales</strong>. Chaque document passe par une file de r\u00e9vision avant d\u2019\u00eatre publi\u00e9.</p>"}},
{title:{en:"The 3-Layer Architecture",fr:"L\u2019architecture \u00e0 3 couches"},
content:{
en:"<p>LedgerLink uses a 3-layer architecture:</p><ul><li><strong>Layer 1 \u2014 Deterministic Engines:</strong> 19 rule-based engines handle tax calculation, fraud detection, bank parsing, reconciliation, substance classification, and more. These engines use exact decimal math and never guess \u2014 they follow Canadian tax law precisely.</li><li><strong>Layer 2 \u2014 AI Agents:</strong> Used for OCR text extraction, vendor identification, GL account suggestions, and client communications. AI is a <em>fallback</em>, not the primary decision-maker.</li><li><strong>Layer 3 \u2014 Human Review:</strong> Every document must be reviewed and approved by a human before posting. The system flags uncertainties and fraud risks for human judgment.</li></ul>",
fr:"<p>LedgerLink utilise une architecture \u00e0 3 couches\u00a0:</p><ul><li><strong>Couche 1 \u2014 Moteurs d\u00e9terministes\u00a0:</strong> 19 moteurs bas\u00e9s sur des r\u00e8gles g\u00e8rent le calcul des taxes, la d\u00e9tection de fraude, l\u2019analyse bancaire, la r\u00e9conciliation, la classification de substance, et plus. Ces moteurs utilisent l\u2019arithm\u00e9tique d\u00e9cimale exacte et ne devinent jamais \u2014 ils suivent la loi fiscale canadienne pr\u00e9cis\u00e9ment.</li><li><strong>Couche 2 \u2014 Agents IA\u00a0:</strong> Utilis\u00e9s pour l\u2019extraction OCR, l\u2019identification de fournisseurs, les suggestions de comptes GL et les communications clients. L\u2019IA est un <em>recours</em>, pas le d\u00e9cideur principal.</li><li><strong>Couche 3 \u2014 R\u00e9vision humaine\u00a0:</strong> Chaque document doit \u00eatre r\u00e9vis\u00e9 et approuv\u00e9 par un humain avant publication. Le syst\u00e8me signale les incertitudes et risques de fraude pour le jugement humain.</li></ul>"}},
{title:{en:"What AI Does vs What Humans Do",fr:"Ce que l\u2019IA fait vs ce que les humains font"},
content:{
en:"<table class='info-table'><tr><th>AI Does</th><th>Humans Do</th></tr><tr><td>Read and extract text from documents (OCR)</td><td>Verify extracted fields are correct</td></tr><tr><td>Suggest vendor name, GL account, tax code</td><td>Approve or correct suggestions</td></tr><tr><td>Calculate GST/QST/HST automatically</td><td>Confirm tax code is appropriate</td></tr><tr><td>Flag potential fraud (13 rules)</td><td>Investigate and override with justification</td></tr><tr><td>Match bank transactions to invoices</td><td>Confirm matches, handle exceptions</td></tr><tr><td>Track learning from corrections</td><td>Final approval before posting to QBO</td></tr></table>",
fr:"<table class='info-table'><tr><th>L\u2019IA fait</th><th>Les humains font</th></tr><tr><td>Lire et extraire le texte des documents (OCR)</td><td>V\u00e9rifier que les champs extraits sont corrects</td></tr><tr><td>Sugg\u00e9rer le nom du fournisseur, compte GL, code de taxe</td><td>Approuver ou corriger les suggestions</td></tr><tr><td>Calculer TPS/TVQ/TVH automatiquement</td><td>Confirmer que le code de taxe est appropri\u00e9</td></tr><tr><td>Signaler la fraude potentielle (13 r\u00e8gles)</td><td>Enqu\u00eater et passer outre avec justification</td></tr><tr><td>Apparier les transactions bancaires aux factures</td><td>Confirmer les appariements, g\u00e9rer les exceptions</td></tr><tr><td>Apprendre des corrections</td><td>Approbation finale avant publication dans QBO</td></tr></table>"}},
{title:{en:"Data Privacy and Law 25",fr:"Confidentialit\u00e9 des donn\u00e9es et Loi 25"},
content:{
en:"<p>LedgerLink is designed with Quebec\u2019s Law 25 (privacy legislation) in mind:</p><ul><li>All data stays on your local machine \u2014 documents are stored in <code>data/</code>, not in the cloud</li><li>AI API calls send only the minimum text needed for extraction; original files stay local</li><li>The database is SQLite, stored at <code>data/ledgerlink_agent.db</code></li><li>Session tokens expire after 12 hours</li><li>Passwords are hashed with bcrypt (12 rounds)</li><li>All user actions are logged to an audit trail</li><li>Rate limiting protects against brute-force attacks (5 failed logins per 15 minutes)</li></ul>",
fr:"<p>LedgerLink est con\u00e7u en tenant compte de la Loi 25 du Qu\u00e9bec (l\u00e9gislation sur la vie priv\u00e9e)\u00a0:</p><ul><li>Toutes les donn\u00e9es restent sur votre machine locale \u2014 les documents sont stock\u00e9s dans <code>data/</code>, pas dans le nuage</li><li>Les appels API de l\u2019IA n\u2019envoient que le texte minimum n\u00e9cessaire \u00e0 l\u2019extraction; les fichiers originaux restent locaux</li><li>La base de donn\u00e9es est SQLite, stock\u00e9e \u00e0 <code>data/ledgerlink_agent.db</code></li><li>Les jetons de session expirent apr\u00e8s 12 heures</li><li>Les mots de passe sont hach\u00e9s avec bcrypt (12 tours)</li><li>Toutes les actions utilisateur sont enregistr\u00e9es dans une piste de v\u00e9rification</li><li>La limitation de d\u00e9bit prot\u00e8ge contre les attaques par force brute (5 \u00e9checs de connexion par 15 minutes)</li></ul>"}}
],
quiz:[
{q:{en:"What is the primary purpose of LedgerLink AI?",fr:"Quel est l\u2019objectif principal de LedgerLink AI\u00a0?"},
opts:{en:["A cloud-based tax filing service","A bookkeeping automation platform for Canadian firms","A banking application","A payroll system"],fr:["Un service de d\u00e9claration fiscale en nuage","Une plateforme d\u2019automatisation de la tenue de livres pour les cabinets canadiens","Une application bancaire","Un syst\u00e8me de paie"]},
ans:1},

{
id:2,
title:{en:"Logging In and Navigation",fr:"Connexion et navigation"},
role:"all",
sections:[
{title:{en:"How to Log In",fr:"Comment se connecter"},
content:{
en:"<p>Open your web browser and go to <code>http://[your-server-ip]:8787</code>. You will see the login page.</p><ul><li>Enter your <strong>username</strong> and <strong>password</strong></li><li>Select your preferred language (FR/EN)</li><li>Click <strong>Log In</strong></li></ul><p>If you enter the wrong password 5 times within 15 minutes, your IP will be temporarily locked out (HTTP 429). Wait 15 minutes and try again.</p><div class='tip'>First-time users: your administrator created your account during setup. If you received a temporary password, you will be asked to change it on first login.</div>",
fr:"<p>Ouvrez votre navigateur et allez \u00e0 <code>http://[ip-du-serveur]:8787</code>. Vous verrez la page de connexion.</p><ul><li>Entrez votre <strong>nom d\u2019utilisateur</strong> et <strong>mot de passe</strong></li><li>S\u00e9lectionnez votre langue pr\u00e9f\u00e9r\u00e9e (FR/EN)</li><li>Cliquez sur <strong>Connexion</strong></li></ul><p>Si vous entrez le mauvais mot de passe 5 fois en 15 minutes, votre IP sera temporairement bloqu\u00e9e (HTTP 429). Attendez 15 minutes et r\u00e9essayez.</p><div class='tip'>Nouveaux utilisateurs\u00a0: votre administrateur a cr\u00e9\u00e9 votre compte lors de la configuration. Si vous avez re\u00e7u un mot de passe temporaire, on vous demandera de le changer \u00e0 la premi\u00e8re connexion.</div>"}},
{title:{en:"Dashboard Layout",fr:"Disposition du tableau de bord"},
content:{
en:"<p>After login, you see the main <strong>Accounting Queue</strong>. Here is every menu item:</p><table class='info-table'><tr><th>Menu Item</th><th>Description</th></tr><tr><td>Queue / File d\u2019attente</td><td>Main review queue \u2014 all documents awaiting action</td></tr><tr><td>Bank Import</td><td>Import bank statements (CSV/OFX) and match transactions</td></tr><tr><td>Reconciliation</td><td>Bank reconciliation by client and period</td></tr><tr><td>Filing Summary</td><td>GST/QST tax summary for filing periods</td></tr><tr><td>Revenu Qu\u00e9bec</td><td>Pre-fill forms for Revenu Qu\u00e9bec filings</td></tr><tr><td>Period Close</td><td>Month-end close checklist and period locking</td></tr><tr><td>Time Tracking</td><td>Start/stop timers, generate invoices</td></tr><tr><td>Calendar</td><td>Filing deadline tracker</td></tr><tr><td>Communications</td><td>AI-assisted client messaging</td></tr><tr><td>Working Papers</td><td>Audit lead sheets (CAS compliance)</td></tr><tr><td>Engagements</td><td>Compilation, review, and audit engagements</td></tr><tr><td>Portfolios</td><td>Client-to-staff assignments</td></tr><tr><td>Users</td><td>User management (owner only)</td></tr><tr><td>Troubleshoot</td><td>System health and diagnostics</td></tr><tr><td>QR Codes</td><td>Generate client upload QR codes</td></tr><tr><td>Analytics</td><td>Performance dashboards (owner only)</td></tr><tr><td>Journal Entries</td><td>Manual journal entries</td></tr><tr><td>Training</td><td>This training system</td></tr></table>",
fr:"<p>Apr\u00e8s la connexion, vous voyez la <strong>File d\u2019attente comptable</strong>. Voici chaque \u00e9l\u00e9ment de menu\u00a0:</p><table class='info-table'><tr><th>\u00c9l\u00e9ment</th><th>Description</th></tr><tr><td>File d\u2019attente</td><td>File de r\u00e9vision principale \u2014 tous les documents en attente d\u2019action</td></tr><tr><td>Import bancaire</td><td>Importer des relev\u00e9s bancaires (CSV/OFX) et apparier les transactions</td></tr><tr><td>R\u00e9conciliation</td><td>R\u00e9conciliation bancaire par client et p\u00e9riode</td></tr><tr><td>Sommaire de production</td><td>Sommaire TPS/TVQ pour les p\u00e9riodes de production</td></tr><tr><td>Revenu Qu\u00e9bec</td><td>Formulaires pr\u00e9-remplis pour Revenu Qu\u00e9bec</td></tr><tr><td>Fermeture de p\u00e9riode</td><td>Liste de contr\u00f4le de fin de mois et verrouillage</td></tr><tr><td>Suivi du temps</td><td>D\u00e9marrer/arr\u00eater les minuteries, g\u00e9n\u00e9rer des factures</td></tr><tr><td>Calendrier</td><td>Suivi des \u00e9ch\u00e9ances de production</td></tr><tr><td>Communications</td><td>Messagerie client assist\u00e9e par IA</td></tr><tr><td>Dossiers de travail</td><td>Feuilles de travail (conformit\u00e9 NCA)</td></tr><tr><td>Mandats</td><td>Mandats de compilation, examen et audit</td></tr><tr><td>Portefeuilles</td><td>Affectation clients-personnel</td></tr><tr><td>Utilisateurs</td><td>Gestion des utilisateurs (propri\u00e9taire seulement)</td></tr><tr><td>D\u00e9pannage</td><td>Sant\u00e9 du syst\u00e8me et diagnostics</td></tr><tr><td>Codes QR</td><td>G\u00e9n\u00e9rer des codes QR pour le portail client</td></tr><tr><td>Analytique</td><td>Tableaux de bord de performance (propri\u00e9taire seulement)</td></tr><tr><td>\u00c9critures de journal</td><td>\u00c9critures de journal manuelles</td></tr><tr><td>Formation</td><td>Ce syst\u00e8me de formation</td></tr></table>"}},
{title:{en:"Language Toggle and User Profile",fr:"Changement de langue et profil utilisateur"},
content:{
en:"<p>You can switch between French and English at any time using the language toggle in the header. Your preference is saved to your user profile and persists across sessions.</p><p>Your <strong>role</strong> determines what you can see and do:</p><table class='info-table'><tr><th>Role</th><th>Capabilities</th></tr><tr><td>Employee</td><td>View queue, review documents, claim tasks, basic editing</td></tr><tr><td>Manager</td><td>All employee features + bank import, reconciliation, filing, time tracking, engagements, period close</td></tr><tr><td>Owner</td><td>All features + user management, analytics, license, troubleshooting, system config</td></tr></table>",
fr:"<p>Vous pouvez basculer entre le fran\u00e7ais et l\u2019anglais \u00e0 tout moment en utilisant le bouton de langue dans l\u2019en-t\u00eate. Votre pr\u00e9f\u00e9rence est enregistr\u00e9e dans votre profil et persiste entre les sessions.</p><p>Votre <strong>r\u00f4le</strong> d\u00e9termine ce que vous pouvez voir et faire\u00a0:</p><table class='info-table'><tr><th>R\u00f4le</th><th>Capacit\u00e9s</th></tr><tr><td>Employ\u00e9</td><td>Voir la file, r\u00e9viser les documents, r\u00e9clamer des t\u00e2ches, \u00e9dition de base</td></tr><tr><td>Gestionnaire</td><td>Toutes les fonctions employ\u00e9 + import bancaire, r\u00e9conciliation, production, suivi du temps, mandats, fermeture de p\u00e9riode</td></tr><tr><td>Propri\u00e9taire</td><td>Toutes les fonctions + gestion des utilisateurs, analytique, licence, d\u00e9pannage, configuration syst\u00e8me</td></tr></table>"}}
],

opts:{en:["In system settings","In the header toggle","In the database","You cannot change it"],fr:["Dans les param\u00e8tres syst\u00e8me","Dans le bouton de l\u2019en-t\u00eate","Dans la base de donn\u00e9es","On ne peut pas la changer"]},ans:1},

{id:3,title:{en:"Document Intake \u2014 Email",fr:"R\u00e9ception de documents \u2014 Courriel"},role:"all",
sections:[
{title:{en:"How Email Intake Works",fr:"Comment fonctionne la r\u00e9ception par courriel"},
content:{en:"<p>LedgerLink runs an ingest service on port 8789 that receives documents via email. When a client or staff member sends an email with attachments, the system:</p><ol><li>Receives the email via the configured SMTP/webhook endpoint</li><li>Extracts all attachments</li><li>Detects file format using <strong>magic bytes</strong> (never by file extension)</li><li>Runs OCR to extract text, vendor, amounts, dates, and tax information</li><li>Creates a document record in the database with status <strong>New</strong></li><li>Places the document in the review queue</li></ol>",
fr:"<p>LedgerLink ex\u00e9cute un service de r\u00e9ception sur le port 8789 qui re\u00e7oit les documents par courriel. Lorsqu\u2019un client ou un membre du personnel envoie un courriel avec des pi\u00e8ces jointes, le syst\u00e8me\u00a0:</p><ol><li>Re\u00e7oit le courriel via le point d\u2019acc\u00e8s SMTP/webhook configur\u00e9</li><li>Extrait toutes les pi\u00e8ces jointes</li><li>D\u00e9tecte le format du fichier par <strong>octets magiques</strong> (jamais par extension)</li><li>Ex\u00e9cute l\u2019OCR pour extraire le texte, le fournisseur, les montants, les dates et les informations fiscales</li><li>Cr\u00e9e un enregistrement de document dans la base de donn\u00e9es avec le statut <strong>Nouveau</strong></li><li>Place le document dans la file de r\u00e9vision</li></ol>"}},
{title:{en:"Accepted File Formats",fr:"Formats de fichiers accept\u00e9s"},
content:{en:"<p>The following formats are supported: <strong>PDF, PNG, JPEG, JPG, HEIC, HEIF, TIFF, WebP</strong></p><p>File type is detected by reading the first bytes of the file (magic bytes), not by file extension. This prevents spoofing.</p><div class='tip'>PDFs with extractable text are processed with pdfplumber. PDFs with less than 20 words of text are sent to AI Vision for image-based extraction.</div>",
fr:"<p>Les formats suivants sont support\u00e9s\u00a0: <strong>PDF, PNG, JPEG, JPG, HEIC, HEIF, TIFF, WebP</strong></p><p>Le type de fichier est d\u00e9tect\u00e9 en lisant les premiers octets du fichier (octets magiques), pas par l\u2019extension. Cela emp\u00eache l\u2019usurpation.</p><div class='tip'>Les PDF avec du texte extractible sont trait\u00e9s par pdfplumber. Les PDF avec moins de 20 mots de texte sont envoy\u00e9s \u00e0 la Vision IA pour l\u2019extraction bas\u00e9e sur l\u2019image.</div>"}},
{title:{en:"How to Check Receipt and Common Problems",fr:"Comment v\u00e9rifier la r\u00e9ception et probl\u00e8mes courants"},
content:{en:"<p>To check if an email was received: go to the <strong>Queue</strong> and filter by the client code or search by vendor name. New documents appear with status <strong>New</strong>.</p><p><strong>Common problems:</strong></p><ul><li><strong>Email not received:</strong> Check the ingest service status in Troubleshoot. Verify SMTP configuration.</li><li><strong>Attachment not extracted:</strong> Ensure the file is in a supported format (not .doc, .xls, etc.)</li><li><strong>Low confidence extraction:</strong> Blurry images or handwritten documents may get low confidence scores and be flagged as NeedsReview</li><li><strong>Duplicate detection:</strong> If the same invoice is sent twice, the fraud engine may flag it as a duplicate</li></ul>",
fr:"<p>Pour v\u00e9rifier si un courriel a \u00e9t\u00e9 re\u00e7u\u00a0: allez dans la <strong>File d\u2019attente</strong> et filtrez par code client ou recherchez par nom de fournisseur. Les nouveaux documents apparaissent avec le statut <strong>Nouveau</strong>.</p><p><strong>Probl\u00e8mes courants\u00a0:</strong></p><ul><li><strong>Courriel non re\u00e7u\u00a0:</strong> V\u00e9rifiez l\u2019\u00e9tat du service de r\u00e9ception dans D\u00e9pannage. V\u00e9rifiez la configuration SMTP.</li><li><strong>Pi\u00e8ce jointe non extraite\u00a0:</strong> Assurez-vous que le fichier est dans un format support\u00e9 (pas .doc, .xls, etc.)</li><li><strong>Extraction \u00e0 faible confiance\u00a0:</strong> Les images floues ou documents manuscrits peuvent obtenir des scores de confiance bas et \u00eatre marqu\u00e9s NeedsReview</li><li><strong>D\u00e9tection de duplicata\u00a0:</strong> Si la m\u00eame facture est envoy\u00e9e deux fois, le moteur de fraude peut la signaler comme duplicata</li></ul>"}}
],

{q:{en:"How does LedgerLink detect file types?",fr:"Comment LedgerLink d\u00e9tecte-t-il les types de fichiers\u00a0?"},
opts:{en:["By file extension","By file name","By magic bytes","By file size"],fr:["Par l\u2019extension du fichier","Par le nom du fichier","Par les octets magiques","Par la taille du fichier"]},ans:2},

{q:{en:"What status does a new document receive?",fr:"Quel statut un nouveau document re\u00e7oit-il\u00a0?"},
opts:{en:["Ready","Posted","New","NeedsReview"],fr:["Pr\u00eat","Publi\u00e9","Nouveau","N\u00e9cessiteR\u00e9vision"]},ans:2},

opts:{en:["They are rejected","They are sent to AI Vision","They are flagged as fraud","They are deleted"],fr:["Ils sont rejet\u00e9s","Ils sont envoy\u00e9s \u00e0 la Vision IA","Ils sont signal\u00e9s comme fraude","Ils sont supprim\u00e9s"]},ans:1}
]

{id:4,title:{en:"Document Intake \u2014 WhatsApp & Telegram",fr:"R\u00e9ception \u2014 WhatsApp et Telegram"},role:"all",
sections:[
{title:{en:"WhatsApp Intake via Twilio",fr:"R\u00e9ception WhatsApp via Twilio"},
content:{en:"<p>Clients can send photos of invoices/receipts via WhatsApp. The process:</p><ol><li>Client sends a photo to your firm\u2019s WhatsApp Business number</li><li>Twilio receives the message and sends a webhook to LedgerLink</li><li>LedgerLink downloads the image from the Twilio URL</li><li>The image goes through OCR extraction</li><li>A document record is created in the review queue</li></ol><div class='tip'>WhatsApp is configured during setup (Step 7). You need a Twilio account with WhatsApp sandbox or a verified number.</div>",
fr:"<p>Les clients peuvent envoyer des photos de factures/re\u00e7us via WhatsApp. Le processus\u00a0:</p><ol><li>Le client envoie une photo au num\u00e9ro WhatsApp Business de votre cabinet</li><li>Twilio re\u00e7oit le message et envoie un webhook \u00e0 LedgerLink</li><li>LedgerLink t\u00e9l\u00e9charge l\u2019image de l\u2019URL Twilio</li><li>L\u2019image passe par l\u2019extraction OCR</li><li>Un enregistrement de document est cr\u00e9\u00e9 dans la file de r\u00e9vision</li></ol><div class='tip'>WhatsApp est configur\u00e9 lors de la configuration initiale (\u00c9tape 7). Vous avez besoin d\u2019un compte Twilio avec un bac \u00e0 sable WhatsApp ou un num\u00e9ro v\u00e9rifi\u00e9.</div>"}},
{title:{en:"Telegram Bot Intake",fr:"R\u00e9ception par bot Telegram"},
content:{en:"<p>A Telegram bot receives documents from clients. Setup requires creating a bot via @BotFather and configuring the bot token in LedgerLink (Step 8 of setup).</p><p><strong>Quality requirements for photos:</strong></p><ul><li>Good lighting \u2014 no shadows across the text</li><li>Full document visible \u2014 no cut-off edges</li><li>Flat surface \u2014 no wrinkles or folds</li><li>Minimum resolution: readable text at normal zoom</li><li>One document per photo is ideal</li></ul>",
fr:"<p>Un bot Telegram re\u00e7oit les documents des clients. La configuration n\u00e9cessite la cr\u00e9ation d\u2019un bot via @BotFather et la configuration du jeton du bot dans LedgerLink (\u00c9tape 8 de la configuration).</p><p><strong>Exigences de qualit\u00e9 pour les photos\u00a0:</strong></p><ul><li>Bon \u00e9clairage \u2014 pas d\u2019ombres sur le texte</li><li>Document complet visible \u2014 pas de bords coup\u00e9s</li><li>Surface plate \u2014 pas de plis ou de froissements</li><li>R\u00e9solution minimale\u00a0: texte lisible au zoom normal</li><li>Un document par photo est id\u00e9al</li></ul>"}}
],

// ─────────────────── MODULE 5 ───────────────────
{id:5,title:{en:"Document Intake \u2014 Client Portal",fr:"R\u00e9ception \u2014 Portail client"},role:"all",
sections:[
{title:{en:"How the Client Portal Works",fr:"Comment fonctionne le portail client"},
content:{en:"<p>The client portal runs on port <strong>8788</strong> as a separate web application. Clients can:</p><ul><li>Upload documents (PDF, images) via drag-and-drop or file picker</li><li>Add optional notes to uploads</li><li>View their submission history with status tracking</li><li>Switch between French and English</li></ul><p>Clients can only see their own documents. They cannot see GL codes, tax codes, confidence scores, or internal review details.</p><p><strong>Limits:</strong> 20 uploads per client per day, 20 MB per file.</p>",
fr:"<p>Le portail client fonctionne sur le port <strong>8788</strong> en tant qu\u2019application web s\u00e9par\u00e9e. Les clients peuvent\u00a0:</p><ul><li>T\u00e9l\u00e9verser des documents (PDF, images) par glisser-d\u00e9poser ou s\u00e9lecteur de fichiers</li><li>Ajouter des notes optionnelles aux t\u00e9l\u00e9versements</li><li>Voir leur historique de soumission avec suivi de statut</li><li>Basculer entre le fran\u00e7ais et l\u2019anglais</li></ul><p>Les clients ne peuvent voir que leurs propres documents. Ils ne peuvent pas voir les codes GL, codes de taxe, scores de confiance ou d\u00e9tails de r\u00e9vision internes.</p><p><strong>Limites\u00a0:</strong> 20 t\u00e9l\u00e9versements par client par jour, 20 Mo par fichier.</p>"}},
{title:{en:"Creating Portal Accounts and QR Codes",fr:"Cr\u00e9ation de comptes portail et codes QR"},
content:{en:"<p>Portal accounts are created in <strong>User Management</strong> (owner) or during onboarding (Step 17). Each client user has <code>role=client</code> and a <code>client_code</code> linking them to their data.</p><p>To send credentials: generate a QR code from the <strong>QR Codes</strong> page. Each client gets a unique QR code that links directly to the portal. You can download individual QR codes as PNG or all codes as a PDF to print and mail to clients.</p>",
fr:"<p>Les comptes portail sont cr\u00e9\u00e9s dans la <strong>Gestion des utilisateurs</strong> (propri\u00e9taire) ou lors de l\u2019int\u00e9gration (\u00c9tape 17). Chaque utilisateur client a <code>role=client</code> et un <code>client_code</code> les liant \u00e0 leurs donn\u00e9es.</p><p>Pour envoyer les identifiants\u00a0: g\u00e9n\u00e9rez un code QR depuis la page <strong>Codes QR</strong>. Chaque client obtient un code QR unique qui lie directement au portail. Vous pouvez t\u00e9l\u00e9charger des codes QR individuels en PNG ou tous les codes en PDF pour imprimer et envoyer par courrier.</p>"}}
],

opts:{en:["Yes, always","Only managers can show them","No, clients see simplified status only","Only after posting"],fr:["Oui, toujours","Seuls les gestionnaires peuvent les montrer","Non, les clients voient un statut simplifi\u00e9 seulement","Seulement apr\u00e8s publication"]},ans:2},
{q:{en:"What is the maximum file size for portal uploads?",fr:"Quelle est la taille maximale de fichier pour les t\u00e9l\u00e9versements du portail\u00a0?"},

{q:{en:"How do you send portal access to a client?",fr:"Comment envoyer l\u2019acc\u00e8s au portail \u00e0 un client\u00a0?"},

// ─────────────────── MODULE 6 ───────────────────
{id:6,title:{en:"Document Intake \u2014 Folder Watcher",fr:"R\u00e9ception \u2014 Surveillance de dossier"},role:"all",
sections:[
{title:{en:"How the Folder Watcher Works",fr:"Comment fonctionne la surveillance de dossier"},
content:{en:"<p>The folder watcher monitors a designated inbox folder for new files. When a file appears, it is automatically processed through the OCR pipeline and added to the review queue.</p><p>The inbox folder location is configured during setup (Step 11). Default path: <code>data/inbox</code></p><p><strong>Setting up a USB scanner:</strong> Configure your scanner to save directly to the inbox folder. Any PDF or image file dropped there will be automatically processed.</p><p><strong>Setting up OneDrive sync:</strong> Point your OneDrive sync folder to the inbox path. Documents synced from any device will be automatically ingested.</p><div class='tip'>The folder watcher status is visible on the Troubleshoot page. If it stops working, check the service status and restart if needed.</div>",
fr:"<p>Le surveillant de dossier surveille un dossier de bo\u00eete de r\u00e9ception d\u00e9sign\u00e9 pour les nouveaux fichiers. Lorsqu\u2019un fichier appara\u00eet, il est automatiquement trait\u00e9 par le pipeline OCR et ajout\u00e9 \u00e0 la file de r\u00e9vision.</p><p>L\u2019emplacement du dossier est configur\u00e9 lors de la configuration (\u00c9tape 11). Chemin par d\u00e9faut\u00a0: <code>data/inbox</code></p><p><strong>Configuration d\u2019un scanneur USB\u00a0:</strong> Configurez votre scanneur pour enregistrer directement dans le dossier de r\u00e9ception. Tout fichier PDF ou image d\u00e9pos\u00e9 sera automatiquement trait\u00e9.</p><p><strong>Configuration de la synchronisation OneDrive\u00a0:</strong> Pointez votre dossier de synchronisation OneDrive vers le chemin de r\u00e9ception. Les documents synchronis\u00e9s depuis n\u2019importe quel appareil seront automatiquement int\u00e9gr\u00e9s.</p><div class='tip'>L\u2019\u00e9tat du surveillant de dossier est visible sur la page D\u00e9pannage. S\u2019il cesse de fonctionner, v\u00e9rifiez l\u2019\u00e9tat du service et red\u00e9marrez si n\u00e9cessaire.</div>"}}
],

// ─────────────────── MODULE 7 ───────────────────
{id:7,title:{en:"Review Queue Basics",fr:"Base de la file de r\u00e9vision"},role:"all",
sections:[
{title:{en:"Queue Layout, Filters, and Statuses",fr:"Disposition de la file, filtres et statuts"},
content:{en:"<p>The review queue is the heart of LedgerLink. It shows all documents that need attention.</p><p><strong>Status meanings:</strong></p><table class='info-table'><tr><th>Status</th><th>Meaning</th></tr><tr><td>New</td><td>Just received, not yet reviewed</td></tr><tr><td>NeedsReview</td><td>AI flagged uncertainties \u2014 human review required</td></tr><tr><td>OnHold</td><td>Placed on hold manually with a reason</td></tr><tr><td>Ready</td><td>All checks passed, ready for posting approval</td></tr><tr><td>Posted</td><td>Successfully posted to QuickBooks</td></tr><tr><td>Exception</td><td>Posting failed or blocked by validation</td></tr></table><p>You can filter by: status, client, vendor name, search text, and assigned staff member. The queue supports pagination for large volumes.</p>",
fr:"<p>La file de r\u00e9vision est le c\u0153ur de LedgerLink. Elle affiche tous les documents n\u00e9cessitant une attention.</p><p><strong>Signification des statuts\u00a0:</strong></p><table class='info-table'><tr><th>Statut</th><th>Signification</th></tr><tr><td>Nouveau</td><td>Juste re\u00e7u, pas encore r\u00e9vis\u00e9</td></tr><tr><td>N\u00e9cessiteR\u00e9vision</td><td>L\u2019IA a signal\u00e9 des incertitudes \u2014 r\u00e9vision humaine requise</td></tr><tr><td>EnAttente</td><td>Mis en attente manuellement avec une raison</td></tr><tr><td>Pr\u00eat</td><td>Tous les contr\u00f4les pass\u00e9s, pr\u00eat pour approbation de publication</td></tr><tr><td>Publi\u00e9</td><td>Publi\u00e9 avec succ\u00e8s dans QuickBooks</td></tr><tr><td>Exception</td><td>Publication \u00e9chou\u00e9e ou bloqu\u00e9e par la validation</td></tr></table><p>Vous pouvez filtrer par\u00a0: statut, client, nom de fournisseur, texte de recherche et membre du personnel assign\u00e9. La file supporte la pagination pour les grands volumes.</p>"}},
{title:{en:"Working with Documents",fr:"Travailler avec les documents"},
content:{en:"<p>Click any document to open its <strong>detail page</strong>. There you can:</p><ul><li><strong>View the original</strong> \u2014 download the PDF/image to compare against extracted fields</li><li><strong>Verify extracted fields</strong> \u2014 vendor, amount, date, GL account, tax code, category</li><li><strong>See AI suggestions</strong> \u2014 based on vendor learning history</li><li><strong>See fraud flags</strong> \u2014 any active fraud or substance flags</li><li><strong>See posting readiness</strong> \u2014 what\u2019s blocking the document from posting</li><li><strong>Approve</strong> \u2014 mark as ready for posting</li><li><strong>Hold</strong> \u2014 place on hold with a reason (e.g., waiting for client info)</li><li><strong>Claim</strong> \u2014 assign the document to yourself</li></ul>",
fr:"<p>Cliquez sur n\u2019importe quel document pour ouvrir sa <strong>page de d\u00e9tail</strong>. L\u00e0, vous pouvez\u00a0:</p><ul><li><strong>Voir l\u2019original</strong> \u2014 t\u00e9l\u00e9charger le PDF/image pour comparer avec les champs extraits</li><li><strong>V\u00e9rifier les champs extraits</strong> \u2014 fournisseur, montant, date, compte GL, code de taxe, cat\u00e9gorie</li><li><strong>Voir les suggestions IA</strong> \u2014 bas\u00e9es sur l\u2019historique d\u2019apprentissage du fournisseur</li><li><strong>Voir les drapeaux de fraude</strong> \u2014 tout drapeau de fraude ou de substance actif</li><li><strong>Voir la pr\u00e9paration \u00e0 la publication</strong> \u2014 ce qui bloque la publication du document</li><li><strong>Approuver</strong> \u2014 marquer comme pr\u00eat pour la publication</li><li><strong>Mettre en attente</strong> \u2014 placer en attente avec une raison</li><li><strong>R\u00e9clamer</strong> \u2014 s\u2019assigner le document</li></ul>"}}
],

// ─────────────────── MODULE 8 ───────────────────
{id:8,title:{en:"Fraud Flags",fr:"Drapeaux de fraude"},role:"all",
sections:[
{title:{en:"The 13 Fraud Detection Rules",fr:"Les 13 r\u00e8gles de d\u00e9tection de fraude"},
content:{en:"<p>LedgerLink\u2019s fraud engine runs <strong>13 deterministic rules</strong> on every document:</p><table class='info-table'><tr><th>#</th><th>Rule</th><th>Severity</th></tr><tr><td>1</td><td><strong>Vendor Amount Anomaly</strong> \u2014 Amount is >2 standard deviations from vendor\u2019s average (needs \u22655 prior transactions)</td><td>MEDIUM</td></tr><tr><td>2</td><td><strong>Vendor Timing Anomaly</strong> \u2014 Invoice received 14+ days from vendor\u2019s normal pattern</td><td>LOW</td></tr><tr><td>3</td><td><strong>Duplicate Exact</strong> \u2014 Same amount + same vendor within 30 days</td><td>HIGH</td></tr><tr><td>4</td><td><strong>Duplicate Cross-Vendor</strong> \u2014 Same amount, different vendor, within 7 days</td><td>MEDIUM</td></tr><tr><td>5</td><td><strong>Weekend Transaction</strong> \u2014 Transaction on Saturday/Sunday, >$200</td><td>LOW</td></tr><tr><td>6</td><td><strong>Holiday Transaction</strong> \u2014 Transaction on Quebec statutory holiday, >$200</td><td>LOW</td></tr><tr><td>7</td><td><strong>Round Number</strong> \u2014 Suspicious round amount from an irregular vendor</td><td>LOW</td></tr><tr><td>8</td><td><strong>New Vendor Large Amount</strong> \u2014 First invoice from vendor exceeds $2,000</td><td>MEDIUM</td></tr><tr><td>9</td><td><strong>Bank Account Change</strong> \u2014 Vendor\u2019s bank details changed</td><td>CRITICAL</td></tr><tr><td>10</td><td><strong>Invoice After Payment</strong> \u2014 Invoice date is after the bank payment date</td><td>HIGH</td></tr><tr><td>11</td><td><strong>Tax Registration Contradiction</strong> \u2014 Vendor charges GST/QST but historically was unregistered</td><td>HIGH</td></tr><tr><td>12</td><td><strong>Vendor Category Shift</strong> \u2014 Category contradicts 80%+ of vendor\u2019s history</td><td>MEDIUM</td></tr><tr><td>13</td><td><strong>Vendor Payee Mismatch</strong> \u2014 Bank payee name differs from invoice vendor</td><td>HIGH</td></tr></table>",
fr:"<p>Le moteur de fraude de LedgerLink ex\u00e9cute <strong>13 r\u00e8gles d\u00e9terministes</strong> sur chaque document\u00a0:</p><table class='info-table'><tr><th>#</th><th>R\u00e8gle</th><th>S\u00e9v\u00e9rit\u00e9</th></tr><tr><td>1</td><td><strong>Anomalie de montant fournisseur</strong> \u2014 Montant >2 \u00e9carts-types de la moyenne du fournisseur (\u22655 transactions pr\u00e9c\u00e9dentes requises)</td><td>MOYEN</td></tr><tr><td>2</td><td><strong>Anomalie de d\u00e9lai fournisseur</strong> \u2014 Facture re\u00e7ue 14+ jours du sch\u00e9ma normal</td><td>BAS</td></tr><tr><td>3</td><td><strong>Duplicata exact</strong> \u2014 M\u00eame montant + m\u00eame fournisseur dans les 30 jours</td><td>\u00c9LEV\u00c9</td></tr><tr><td>4</td><td><strong>Duplicata inter-fournisseurs</strong> \u2014 M\u00eame montant, fournisseur diff\u00e9rent, dans les 7 jours</td><td>MOYEN</td></tr><tr><td>5</td><td><strong>Transaction de fin de semaine</strong> \u2014 Transaction samedi/dimanche, >200$</td><td>BAS</td></tr><tr><td>6</td><td><strong>Transaction f\u00e9ri\u00e9e</strong> \u2014 Transaction un jour f\u00e9ri\u00e9 du Qu\u00e9bec, >200$</td><td>BAS</td></tr><tr><td>7</td><td><strong>Nombre rond</strong> \u2014 Montant rond suspect d\u2019un fournisseur irr\u00e9gulier</td><td>BAS</td></tr><tr><td>8</td><td><strong>Nouveau fournisseur gros montant</strong> \u2014 Premi\u00e8re facture du fournisseur >2\u00a0000$</td><td>MOYEN</td></tr><tr><td>9</td><td><strong>Changement de compte bancaire</strong> \u2014 Les d\u00e9tails bancaires du fournisseur ont chang\u00e9</td><td>CRITIQUE</td></tr><tr><td>10</td><td><strong>Facture apr\u00e8s paiement</strong> \u2014 Date de facture apr\u00e8s la date de paiement bancaire</td><td>\u00c9LEV\u00c9</td></tr><tr><td>11</td><td><strong>Contradiction d\u2019inscription fiscale</strong> \u2014 Fournisseur facture TPS/TVQ mais historiquement non inscrit</td><td>\u00c9LEV\u00c9</td></tr><tr><td>12</td><td><strong>Changement de cat\u00e9gorie fournisseur</strong> \u2014 Cat\u00e9gorie contredit 80%+ de l\u2019historique</td><td>MOYEN</td></tr><tr><td>13</td><td><strong>Discordance nom b\u00e9n\u00e9ficiaire</strong> \u2014 Nom du b\u00e9n\u00e9ficiaire bancaire diff\u00e8re du fournisseur de la facture</td><td>\u00c9LEV\u00c9</td></tr></table>"}},
{title:{en:"Overriding Fraud Flags",fr:"Passer outre les drapeaux de fraude"},
content:{en:"<p><strong>Severity levels:</strong> CRITICAL > HIGH > MEDIUM > LOW</p><p>CRITICAL and HIGH fraud flags <strong>block auto-approval</strong> and require a manager or owner to override with a detailed justification (minimum 10 characters). The override reason is permanently recorded in the audit log and cannot be changed after the fact (locked by database trigger).</p><div class='warning'>Never override a CRITICAL fraud flag without investigating. Bank account changes are the #1 indicator of payment fraud.</div>",
fr:"<p><strong>Niveaux de s\u00e9v\u00e9rit\u00e9\u00a0:</strong> CRITIQUE > \u00c9LEV\u00c9 > MOYEN > BAS</p><p>Les drapeaux CRITIQUE et \u00c9LEV\u00c9 <strong>bloquent l\u2019approbation automatique</strong> et n\u00e9cessitent qu\u2019un gestionnaire ou propri\u00e9taire passe outre avec une justification d\u00e9taill\u00e9e (minimum 10 caract\u00e8res). La raison de d\u00e9rogation est enregistr\u00e9e de fa\u00e7on permanente dans le journal de v\u00e9rification et ne peut \u00eatre modifi\u00e9e apr\u00e8s le fait (verrouill\u00e9e par d\u00e9clencheur de base de donn\u00e9es).</p><div class='warning'>Ne passez jamais outre un drapeau CRITIQUE sans enqu\u00eater. Les changements de compte bancaire sont l\u2019indicateur #1 de fraude de paiement.</div>"}}
],

{q:{en:"How many prior transactions are needed for the vendor amount anomaly rule?",fr:"Combien de transactions pr\u00e9c\u00e9dentes sont n\u00e9cessaires pour la r\u00e8gle d\u2019anomalie de montant\u00a0?"},
opts:{en:["1","3","5","10"],fr:["1","3","5","10"]},ans:2}

// ─────────────────── MODULE 9 ───────────────────
{id:9,title:{en:"Substance Flags",fr:"Drapeaux de substance"},role:"all",
sections:[
{title:{en:"What Substance Classification Means",fr:"Ce que signifie la classification de substance"},
content:{en:"<p>The substance engine classifies what an expense <em>really is</em> economically, not just what it looks like on paper. This prevents posting errors like booking a loan as revenue or a capital purchase as an operating expense.</p><p><strong>Key classifications:</strong></p><table class='info-table'><tr><th>Type</th><th>Example</th><th>Why It Matters</th></tr><tr><td>CapEx</td><td>$8,000 Dell server purchase</td><td>Must go to fixed assets (GL 1500), not expenses</td></tr><tr><td>Operating Expense</td><td>$200 office supplies</td><td>Normal expense, goes to appropriate expense GL</td></tr><tr><td>Loan Payment</td><td>$5,000 mortgage payment</td><td>Must go to liabilities (GL 2500), not expenses</td></tr><tr><td>Customer Deposit</td><td>$25,000 project deposit</td><td>Deferred revenue liability (GL 2400), not revenue</td></tr><tr><td>Intercompany</td><td>$50,000 transfer to holding company</td><td>Related party transaction (GL 1700)</td></tr><tr><td>Personal Expense</td><td>Groceries on business card</td><td>Must be flagged \u2014 not deductible</td></tr><tr><td>Tax Remittance</td><td>QST payment to Revenu Qu\u00e9bec</td><td>Goes to tax payable (GL 2210), not expenses</td></tr></table><div class='key-point'>When the substance engine flags a document, it sets <code>block_auto_approval=True</code>, forcing human review. You must confirm or override the classification before the document can be posted.</div>",
fr:"<p>Le moteur de substance classifie ce qu\u2019une d\u00e9pense <em>est vraiment</em> \u00e9conomiquement, pas seulement ce qu\u2019elle semble sur papier. Cela pr\u00e9vient les erreurs comme comptabiliser un pr\u00eat comme un revenu ou un achat d\u2019immobilisation comme une d\u00e9pense d\u2019exploitation.</p><p><strong>Classifications cl\u00e9s\u00a0:</strong></p><table class='info-table'><tr><th>Type</th><th>Exemple</th><th>Pourquoi c\u2019est important</th></tr><tr><td>CapEx</td><td>Achat serveur Dell 8\u00a0000$</td><td>Doit aller aux immobilisations (GL 1500), pas aux d\u00e9penses</td></tr><tr><td>D\u00e9pense d\u2019exploitation</td><td>Fournitures de bureau 200$</td><td>D\u00e9pense normale, va au GL de d\u00e9pense appropri\u00e9</td></tr><tr><td>Paiement de pr\u00eat</td><td>Paiement hypoth\u00e9caire 5\u00a0000$</td><td>Doit aller aux passifs (GL 2500), pas aux d\u00e9penses</td></tr><tr><td>D\u00e9p\u00f4t client</td><td>D\u00e9p\u00f4t de projet 25\u00a0000$</td><td>Revenu diff\u00e9r\u00e9 passif (GL 2400), pas un revenu</td></tr><tr><td>Intercompagnie</td><td>Transfert de 50\u00a0000$ \u00e0 la soci\u00e9t\u00e9 de portefeuille</td><td>Transaction entre apparent\u00e9s (GL 1700)</td></tr><tr><td>D\u00e9pense personnelle</td><td>\u00c9picerie sur la carte d\u2019affaires</td><td>Doit \u00eatre signal\u00e9 \u2014 non d\u00e9ductible</td></tr><tr><td>Remise de taxes</td><td>Paiement TVQ \u00e0 Revenu Qu\u00e9bec</td><td>Va aux taxes \u00e0 payer (GL 2210), pas aux d\u00e9penses</td></tr></table><div class='key-point'>Quand le moteur de substance signale un document, il met <code>block_auto_approval=True</code>, for\u00e7ant la r\u00e9vision humaine. Vous devez confirmer ou passer outre la classification avant que le document puisse \u00eatre publi\u00e9.</div>"}}
],

// ─────────────────── MODULE 10 ───────────────────
{id:10,title:{en:"Uncertainty Flags",fr:"Drapeaux d\u2019incertitude"},role:"all",
sections:[
{title:{en:"Understanding Uncertainty in LedgerLink",fr:"Comprendre l\u2019incertitude dans LedgerLink"},
content:{en:"<p>The uncertainty engine evaluates every document and produces one of three outcomes:</p><table class='info-table'><tr><th>Outcome</th><th>Confidence</th><th>Action</th></tr><tr><td>SAFE_TO_POST</td><td>\u226580%</td><td>Can be approved for posting</td></tr><tr><td>PARTIAL_POST</td><td>60\u201379%</td><td>Some fields may need correction</td></tr><tr><td>BLOCK_PENDING_REVIEW</td><td><60%</td><td>Must be fully reviewed before any posting</td></tr></table><p><strong>Common uncertainty reasons:</strong></p><ul><li><strong>VENDOR_PAYEE_MISMATCH</strong> \u2014 Invoice vendor name doesn\u2019t match bank payee. Verify the payee is correct.</li><li><strong>DATE_AMBIGUOUS</strong> \u2014 Date could be DD/MM or MM/DD (e.g., 03/04/2026). Check the original document. French documents default to DD/MM, English to MM/DD.</li><li><strong>ALLOCATION_GAP_UNEXPLAINED</strong> \u2014 Line item totals don\u2019t add up to the invoice total. Check for missing lines or tax-inclusive amounts.</li></ul><div class='tip'>When you see BLOCK_PENDING_REVIEW, you may need to call the client for more information. Use the Communications page to draft an AI-assisted message.</div>",
fr:"<p>Le moteur d\u2019incertitude \u00e9value chaque document et produit l\u2019un de trois r\u00e9sultats\u00a0:</p><table class='info-table'><tr><th>R\u00e9sultat</th><th>Confiance</th><th>Action</th></tr><tr><td>S\u00dbR_DE_PUBLIER</td><td>\u226580%</td><td>Peut \u00eatre approuv\u00e9 pour publication</td></tr><tr><td>PUBLICATION_PARTIELLE</td><td>60\u201379%</td><td>Certains champs peuvent n\u00e9cessiter une correction</td></tr><tr><td>BLOQUER_EN_ATTENTE_R\u00c9VISION</td><td><60%</td><td>Doit \u00eatre enti\u00e8rement r\u00e9vis\u00e9 avant toute publication</td></tr></table><p><strong>Raisons d\u2019incertitude courantes\u00a0:</strong></p><ul><li><strong>DISCORDANCE_NOM_B\u00c9N\u00c9FICIAIRE</strong> \u2014 Le nom du fournisseur de la facture ne correspond pas au b\u00e9n\u00e9ficiaire bancaire.</li><li><strong>DATE_AMBIGU\u00cb</strong> \u2014 La date pourrait \u00eatre JJ/MM ou MM/JJ (ex. 03/04/2026). V\u00e9rifiez le document original. Les documents fran\u00e7ais utilisent JJ/MM par d\u00e9faut.</li><li><strong>\u00c9CART_ALLOCATION_INEXPLIQ\u00c9</strong> \u2014 Les totaux de lignes ne correspondent pas au total de la facture.</li></ul><div class='tip'>Quand vous voyez BLOQUER_EN_ATTENTE_R\u00c9VISION, vous devrez peut-\u00eatre appeler le client. Utilisez la page Communications pour r\u00e9diger un message assist\u00e9 par IA.</div>"}}
],
quiz:[
{q:{en:"What confidence threshold means SAFE_TO_POST?",fr:"Quel seuil de confiance signifie S\u00dbR_DE_PUBLIER\u00a0?"},
opts:{en:["\u226590%","\u226580%","\u226570%","\u226560%"],fr:["\u226590%","\u226580%","\u226570%","\u226560%"]},ans:1},
{q:{en:"A confidence below 60% results in:",fr:"Une confiance inf\u00e9rieure \u00e0 60% entra\u00eene\u00a0:"},

{id:11,title:{en:"Quebec Tax Codes",fr:"Codes de taxe du Qu\u00e9bec"},role:"all",
sections:[
{title:{en:"Complete Tax Code Reference",fr:"R\u00e9f\u00e9rence compl\u00e8te des codes de taxe"},
content:{en:"<table class='info-table'><tr><th>Code</th><th>Description</th><th>GST</th><th>QST</th><th>ITC/ITR Recovery</th></tr><tr><td><strong>T</strong></td><td>Taxable \u2014 standard QC purchase</td><td>5%</td><td>9.975%</td><td>100% CTI + 100% RTI</td></tr><tr><td><strong>Z</strong></td><td>Zero-rated (basic groceries, prescriptions, exports)</td><td>0%</td><td>0%</td><td>0%</td></tr><tr><td><strong>E</strong></td><td>Exempt (insurance premiums, financial services, medical, daycare, long-term residential rent)</td><td>N/A</td><td>N/A</td><td>0%</td></tr><tr><td><strong>M</strong></td><td>Meals & entertainment \u2014 50% rule</td><td>5%</td><td>9.975%</td><td>50% CTI + 50% RTI</td></tr><tr><td><strong>I</strong></td><td>Insurance (Quebec special ~9% premium tax)</td><td>N/A</td><td>~9%</td><td>0% \u2014 not recoverable</td></tr><tr><td><strong>GST_ONLY</strong></td><td>Provinces with GST only (AB, BC, SK, MB, NT, NU, YT)</td><td>5%</td><td>N/A</td><td>100% CTI, no RTI</td></tr><tr><td><strong>HST</strong></td><td>Ontario (13%) or Atlantic (15%)</td><td colspan='2'>Combined HST</td><td>100% ITC</td></tr><tr><td><strong>VAT</strong></td><td>Foreign \u2014 not recoverable</td><td>N/A</td><td>N/A</td><td>0%</td></tr></table>",
fr:"<table class='info-table'><tr><th>Code</th><th>Description</th><th>TPS</th><th>TVQ</th><th>R\u00e9cup\u00e9ration CTI/RTI</th></tr><tr><td><strong>T</strong></td><td>Taxable \u2014 achat standard QC</td><td>5%</td><td>9,975%</td><td>100% CTI + 100% RTI</td></tr><tr><td><strong>Z</strong></td><td>D\u00e9tax\u00e9 (\u00e9picerie de base, prescriptions, exportations)</td><td>0%</td><td>0%</td><td>0%</td></tr><tr><td><strong>E</strong></td><td>Exon\u00e9r\u00e9 (primes d\u2019assurance, services financiers, m\u00e9dical, garderie, loyer r\u00e9sidentiel long terme)</td><td>S/O</td><td>S/O</td><td>0%</td></tr><tr><td><strong>M</strong></td><td>Repas et divertissement \u2014 r\u00e8gle du 50%</td><td>5%</td><td>9,975%</td><td>50% CTI + 50% RTI</td></tr><tr><td><strong>I</strong></td><td>Assurance (taxe sp\u00e9ciale QC ~9%)</td><td>S/O</td><td>~9%</td><td>0% \u2014 non r\u00e9cup\u00e9rable</td></tr><tr><td><strong>GST_ONLY</strong></td><td>Provinces TPS seulement (AB, BC, SK, MB, NT, NU, YT)</td><td>5%</td><td>S/O</td><td>100% CTI, pas de RTI</td></tr><tr><td><strong>HST</strong></td><td>Ontario (13%) ou Atlantique (15%)</td><td colspan='2'>TVH combin\u00e9e</td><td>100% CTI</td></tr><tr><td><strong>VAT</strong></td><td>\u00c9tranger \u2014 non r\u00e9cup\u00e9rable</td><td>S/O</td><td>S/O</td><td>0%</td></tr></table>"}},
{title:{en:"Real Examples",fr:"Exemples r\u00e9els"},
content:{en:"<ol><li><strong>Office supplies from Staples (QC)</strong> \u2192 Code T (5% GST + 9.975% QST, full CTI/RTI)</li><li><strong>Client lunch at restaurant</strong> \u2192 Code M (full tax charged, only 50% recoverable)</li><li><strong>Car insurance premium</strong> \u2192 Code I (9% premium, not recoverable)</li><li><strong>Medical exam for employee</strong> \u2192 Code E (exempt, no tax)</li><li><strong>Basic groceries for office</strong> \u2192 Code Z (zero-rated)</li><li><strong>Equipment from Alberta vendor</strong> \u2192 Code GST_ONLY (5% GST only, no QST)</li><li><strong>Software from Ontario vendor</strong> \u2192 Code HST (13% HST)</li><li><strong>Foreign consulting service</strong> \u2192 Code VAT (not recoverable)</li><li><strong>Rent for commercial space</strong> \u2192 Code T (commercial rent is taxable)</li><li><strong>Daycare services</strong> \u2192 Code E (exempt)</li></ol><div class='warning'>A Quebec vendor should NEVER have HST. If you see a QC vendor charging 13% or 15% HST, that\u2019s an error \u2014 flag it. Similarly, an Alberta vendor should never have QST.</div>",
fr:"<ol><li><strong>Fournitures de bureau de Staples (QC)</strong> \u2192 Code T (5% TPS + 9,975% TVQ, CTI/RTI complets)</li><li><strong>D\u00eener client au restaurant</strong> \u2192 Code M (taxe compl\u00e8te, seulement 50% r\u00e9cup\u00e9rable)</li><li><strong>Prime d\u2019assurance auto</strong> \u2192 Code I (9% prime, non r\u00e9cup\u00e9rable)</li><li><strong>Examen m\u00e9dical pour employ\u00e9</strong> \u2192 Code E (exon\u00e9r\u00e9, pas de taxe)</li><li><strong>\u00c9picerie de base pour le bureau</strong> \u2192 Code Z (d\u00e9tax\u00e9)</li><li><strong>\u00c9quipement d\u2019un fournisseur albertain</strong> \u2192 Code GST_ONLY (5% TPS seulement, pas de TVQ)</li><li><strong>Logiciel d\u2019un fournisseur ontarien</strong> \u2192 Code HST (13% TVH)</li><li><strong>Service de consultation \u00e9tranger</strong> \u2192 Code VAT (non r\u00e9cup\u00e9rable)</li><li><strong>Loyer commercial</strong> \u2192 Code T (le loyer commercial est taxable)</li><li><strong>Services de garderie</strong> \u2192 Code E (exon\u00e9r\u00e9)</li></ol><div class='warning'>Un fournisseur qu\u00e9b\u00e9cois ne devrait JAMAIS avoir de TVH. Si vous voyez un fournisseur QC facturant 13% ou 15% TVH, c\u2019est une erreur \u2014 signalez-le. De m\u00eame, un fournisseur albertain ne devrait jamais avoir de TVQ.</div>"}}
],

// ─────────────────── MODULE 12 ───────────────────
{id:12,title:{en:"ITC and ITR",fr:"CTI et RTI"},role:"all",
sections:[
{title:{en:"Input Tax Credits (ITC/CTI) and Input Tax Refunds (ITR/RTI)",fr:"Cr\u00e9dits de taxe sur les intrants (CTI) et Remboursements de taxe sur les intrants (RTI)"},
content:{en:"<p><strong>CTI (Credit de Taxe sur les Intrants)</strong> = recovery of GST paid on business purchases.<br><strong>RTI (Remboursement de Taxe sur les Intrants)</strong> = recovery of QST paid on business purchases.</p><p>LedgerLink calculates these automatically based on the tax code:</p><ul><li>Code T: 100% CTI on GST, 100% RTI on QST</li><li>Code M (meals): 50% CTI, 50% RTI</li><li>Code E/Z/I/VAT: 0% recovery</li><li>Code GST_ONLY: CTI on GST only (no QST was charged)</li></ul><p><strong>Restrictions:</strong></p><ul><li><strong>Unregistered supplier:</strong> If a vendor is not GST/QST registered, you cannot claim CTI/RTI even if they incorrectly charged tax</li><li><strong>Large business restrictions:</strong> Some large businesses face CTI restrictions on certain expense categories</li><li><strong>Personal use apportionment:</strong> If an expense is partially personal, only the business portion qualifies</li></ul><p>The <strong>Filing Summary</strong> page shows the calculated CTI/RTI totals for each period, ready for your Revenu Qu\u00e9bec filing.</p>",
fr:"<p><strong>CTI (Cr\u00e9dit de Taxe sur les Intrants)</strong> = r\u00e9cup\u00e9ration de la TPS pay\u00e9e sur les achats d\u2019affaires.<br><strong>RTI (Remboursement de Taxe sur les Intrants)</strong> = r\u00e9cup\u00e9ration de la TVQ pay\u00e9e sur les achats d\u2019affaires.</p><p>LedgerLink les calcule automatiquement selon le code de taxe\u00a0:</p><ul><li>Code T\u00a0: 100% CTI sur la TPS, 100% RTI sur la TVQ</li><li>Code M (repas)\u00a0: 50% CTI, 50% RTI</li><li>Code E/Z/I/VAT\u00a0: 0% r\u00e9cup\u00e9ration</li><li>Code GST_ONLY\u00a0: CTI sur la TPS seulement (pas de TVQ factur\u00e9e)</li></ul><p><strong>Restrictions\u00a0:</strong></p><ul><li><strong>Fournisseur non inscrit\u00a0:</strong> Si un fournisseur n\u2019est pas inscrit TPS/TVQ, vous ne pouvez pas r\u00e9clamer de CTI/RTI m\u00eame s\u2019il a factur\u00e9 la taxe incorrectement</li><li><strong>Restrictions grandes entreprises\u00a0:</strong> Certaines grandes entreprises font face \u00e0 des restrictions de CTI</li><li><strong>R\u00e9partition usage personnel\u00a0:</strong> Si une d\u00e9pense est partiellement personnelle, seule la portion d\u2019affaires est admissible</li></ul><p>La page <strong>Sommaire de production</strong> affiche les totaux CTI/RTI calcul\u00e9s pour chaque p\u00e9riode.</p>"}}
],

// ─────────────────── MODULE 13 ───────────────────
{id:13,title:{en:"Bank Import and Matching",fr:"Import bancaire et appariement"},role:"all",
sections:[
{title:{en:"Supported Banks and Import Process",fr:"Banques support\u00e9es et processus d\u2019importation"},
content:{en:"<p><strong>Supported banks:</strong> Desjardins, National Bank (BNC), BMO, TD, RBC</p><p><strong>Supported formats:</strong> CSV and OFX (detected by magic bytes, not extension)</p><p><strong>How to import:</strong></p><ol><li>Download your bank statement as CSV or OFX from your bank\u2019s website</li><li>Go to <strong>Bank Import</strong> in LedgerLink</li><li>Select the client and upload the file</li><li>LedgerLink auto-detects the bank from the file headers/content</li><li>Transactions are parsed and matched against existing documents</li></ol><p><strong>Understanding match scores:</strong> Smart matching uses vendor name similarity (\u226580%), amount within 2%, and date within 7 days. High-confidence matches are auto-suggested. Low-confidence matches require manual review.</p>",
fr:"<p><strong>Banques support\u00e9es\u00a0:</strong> Desjardins, Banque Nationale (BNC), BMO, TD, RBC</p><p><strong>Formats support\u00e9s\u00a0:</strong> CSV et OFX (d\u00e9tect\u00e9s par octets magiques, pas l\u2019extension)</p><p><strong>Comment importer\u00a0:</strong></p><ol><li>T\u00e9l\u00e9chargez votre relev\u00e9 bancaire en CSV ou OFX depuis le site de votre banque</li><li>Allez \u00e0 <strong>Import bancaire</strong> dans LedgerLink</li><li>S\u00e9lectionnez le client et t\u00e9l\u00e9versez le fichier</li><li>LedgerLink d\u00e9tecte automatiquement la banque depuis les en-t\u00eates/contenu du fichier</li><li>Les transactions sont analys\u00e9es et appari\u00e9es avec les documents existants</li></ol><p><strong>Comprendre les scores d\u2019appariement\u00a0:</strong> L\u2019appariement intelligent utilise la similarit\u00e9 du nom de fournisseur (\u226580%), le montant \u00e0 2% pr\u00e8s, et la date dans les 7 jours. Les appariements \u00e0 haute confiance sont auto-sugg\u00e9r\u00e9s. Les appariements \u00e0 faible confiance n\u00e9cessitent une r\u00e9vision manuelle.</p>"}},
{title:{en:"Split Payments and Cross-Currency",fr:"Paiements fractionn\u00e9s et multi-devises"},
content:{en:"<p><strong>Split payment matching:</strong> When a single bank payment covers multiple invoices, LedgerLink groups them and lets you confirm the split allocation.</p><p><strong>Cross-currency matching (USD/CAD):</strong> For USD invoices paid from a CAD account, LedgerLink uses Bank of Canada exchange rates to verify the conversion is accurate (tolerance: 0.5%).</p><p><strong>Bank reversals:</strong> The system detects bank transaction reversals (e.g., NSF cheques) and flags them for review.</p>",
fr:"<p><strong>Appariement de paiement fractionn\u00e9\u00a0:</strong> Quand un seul paiement bancaire couvre plusieurs factures, LedgerLink les regroupe et vous permet de confirmer la r\u00e9partition.</p><p><strong>Appariement multi-devises (USD/CAD)\u00a0:</strong> Pour les factures USD pay\u00e9es d\u2019un compte CAD, LedgerLink utilise les taux de change de la Banque du Canada pour v\u00e9rifier la conversion (tol\u00e9rance\u00a0: 0,5%).</p><p><strong>Contre-passations bancaires\u00a0:</strong> Le syst\u00e8me d\u00e9tecte les contre-passations de transactions bancaires (ex. ch\u00e8ques NSF) et les signale pour r\u00e9vision.</p>"}}
],
quiz:[
{q:{en:"Which bank is NOT supported?",fr:"Quelle banque n\u2019est PAS support\u00e9e\u00a0?"},
opts:{en:["Desjardins","HSBC","BMO","RBC"],fr:["Desjardins","HSBC","BMO","RBC"]},ans:1},
{q:{en:"What vendor name similarity is needed for auto-match?",fr:"Quelle similarit\u00e9 de nom de fournisseur est n\u00e9cessaire pour l\u2019appariement automatique\u00a0?"},
opts:{en:["\u226550%","\u226570%","\u226580%","\u226590%"],fr:["\u226550%","\u226570%","\u226580%","\u226590%"]},ans:2},
{q:{en:"What tolerance is used for FX conversion verification?",fr:"Quelle tol\u00e9rance est utilis\u00e9e pour la v\u00e9rification de conversion de devises\u00a0?"},

// ─────────────────── MODULE 14 ───────────────────
{id:14,title:{en:"Bank Reconciliation",fr:"R\u00e9conciliation bancaire"},role:"all",
sections:[
{title:{en:"How Bank Reconciliation Works",fr:"Comment fonctionne la r\u00e9conciliation bancaire"},
content:{en:"<p>A bank reconciliation ensures your GL bank balance matches the actual bank statement balance.</p><p><strong>The formula:</strong></p><p style='background:#f3f4f6;padding:12px;border-radius:8px;font-family:monospace;font-size:13px'>GL Balance + Deposits in Transit - Outstanding Cheques \u00b1 Bank Errors \u00b1 Book Errors + Interest - Bank Charges = Statement Balance</p><p><strong>Steps:</strong></p><ol><li>Go to <strong>Reconciliation > New</strong></li><li>Select client and period</li><li>Enter the GL balance and statement balance</li><li>LedgerLink auto-populates outstanding items from unmatched bank transactions</li><li>Mark items as cleared as they appear on the statement</li><li>Add any missing items (bank charges, interest, errors)</li><li>When the difference is $0.00 (\u00b1$0.01), click <strong>Finalize</strong></li></ol><div class='warning'>Once finalized, a reconciliation cannot be modified. Items have amount validation: deposits must be positive, amounts over $10M are rejected as implausible, and duplicates within $0.01 are flagged.</div>",
fr:"<p>Une r\u00e9conciliation bancaire garantit que votre solde GL bancaire correspond au solde r\u00e9el du relev\u00e9.</p><p><strong>La formule\u00a0:</strong></p><p style='background:#f3f4f6;padding:12px;border-radius:8px;font-family:monospace;font-size:13px'>Solde GL + D\u00e9p\u00f4ts en transit - Ch\u00e8ques en circulation \u00b1 Erreurs bancaires \u00b1 Erreurs comptables + Int\u00e9r\u00eats - Frais bancaires = Solde du relev\u00e9</p><p><strong>\u00c9tapes\u00a0:</strong></p><ol><li>Allez \u00e0 <strong>R\u00e9conciliation > Nouveau</strong></li><li>S\u00e9lectionnez le client et la p\u00e9riode</li><li>Entrez le solde GL et le solde du relev\u00e9</li><li>LedgerLink auto-remplit les \u00e9l\u00e9ments en circulation des transactions non appari\u00e9es</li><li>Marquez les \u00e9l\u00e9ments comme compens\u00e9s lorsqu\u2019ils apparaissent sur le relev\u00e9</li><li>Ajoutez les \u00e9l\u00e9ments manquants (frais bancaires, int\u00e9r\u00eats, erreurs)</li><li>Quand la diff\u00e9rence est 0,00$ (\u00b10,01$), cliquez sur <strong>Finaliser</strong></li></ol><div class='warning'>Une fois finalis\u00e9e, une r\u00e9conciliation ne peut pas \u00eatre modifi\u00e9e. Les montants sont valid\u00e9s\u00a0: les d\u00e9p\u00f4ts doivent \u00eatre positifs, les montants de plus de 10M$ sont rejet\u00e9s comme invraisemblables, et les doublons \u00e0 0,01$ pr\u00e8s sont signal\u00e9s.</div>"}}
],

opts:{en:["$0.00 exactly","$0.01","$1.00","$10.00"],fr:["0,00$ exactement","0,01$","1,00$","10,00$"]},ans:1},

{id:15,title:{en:"Month-End Close",fr:"Fermeture de fin de mois"},role:"all",
sections:[
{title:{en:"Period Close Process",fr:"Processus de fermeture de p\u00e9riode"},
content:{en:"<p>The period close page shows a <strong>7-item checklist</strong>. Each item must be completed or waived before the period can be locked.</p><p><strong>Checklist items include:</strong> All documents posted, bank reconciliation done, filing summary reviewed, adjusting entries made, client questions resolved, working papers updated, supervisor sign-off.</p><p><strong>Process:</strong></p><ol><li>Go to <strong>Period Close</strong>, select client and period</li><li>Work through each checklist item \u2014 mark as complete with notes</li><li>Items can be waived with documentation explaining why</li><li>When all items are checked, click <strong>Lock Period</strong></li></ol><p><strong>After locking:</strong> No new documents can be posted to that period. No existing documents can be modified. Only a manager or owner can unlock the period if corrections are needed.</p><p>Download the <strong>Period Close PDF</strong> for your files.</p>",
fr:"<p>La page de fermeture de p\u00e9riode affiche une <strong>liste de contr\u00f4le de 7 \u00e9l\u00e9ments</strong>. Chaque \u00e9l\u00e9ment doit \u00eatre compl\u00e9t\u00e9 ou dispens\u00e9 avant que la p\u00e9riode puisse \u00eatre verrouill\u00e9e.</p><p><strong>\u00c9l\u00e9ments de la liste\u00a0:</strong> Tous les documents publi\u00e9s, r\u00e9conciliation bancaire faite, sommaire de production r\u00e9vis\u00e9, \u00e9critures d\u2019ajustement faites, questions clients r\u00e9solues, dossiers de travail mis \u00e0 jour, approbation du superviseur.</p><p><strong>Processus\u00a0:</strong></p><ol><li>Allez \u00e0 <strong>Fermeture de p\u00e9riode</strong>, s\u00e9lectionnez le client et la p\u00e9riode</li><li>Traitez chaque \u00e9l\u00e9ment \u2014 marquez comme compl\u00e9t\u00e9 avec des notes</li><li>Les \u00e9l\u00e9ments peuvent \u00eatre dispens\u00e9s avec documentation</li><li>Quand tous les \u00e9l\u00e9ments sont coch\u00e9s, cliquez <strong>Verrouiller la p\u00e9riode</strong></li></ol><p><strong>Apr\u00e8s le verrouillage\u00a0:</strong> Aucun nouveau document ne peut \u00eatre publi\u00e9 dans cette p\u00e9riode. Aucun document existant ne peut \u00eatre modifi\u00e9. Seul un gestionnaire ou propri\u00e9taire peut d\u00e9verrouiller.</p>"}}
],

{id:16,title:{en:"Time Tracking and Billing",fr:"Suivi du temps et facturation"},role:"manager",
sections:[
{title:{en:"Time Tracking Features",fr:"Fonctionnalit\u00e9s de suivi du temps"},
content:{en:"<p>Available for <strong>Manager+</strong> roles.</p><ul><li><strong>Start/stop timer:</strong> Click Start on a client to begin tracking time. Click Stop when done. The duration is calculated automatically.</li><li><strong>Manual time entry:</strong> Add time entries retroactively with client, date, hours, and description.</li><li><strong>Generate invoice:</strong> Select a client and period, set an hourly rate, and LedgerLink generates a professional invoice PDF with GST/QST on professional fees.</li><li><strong>Export:</strong> Download invoices as PDF for sending to clients.</li></ul>",
fr:"<p>Disponible pour les r\u00f4les <strong>Gestionnaire+</strong>.</p><ul><li><strong>D\u00e9marrer/arr\u00eater le minuteur\u00a0:</strong> Cliquez D\u00e9marrer sur un client pour commencer le suivi. Cliquez Arr\u00eater quand termin\u00e9.</li><li><strong>Saisie manuelle du temps\u00a0:</strong> Ajoutez des entr\u00e9es de temps r\u00e9troactivement avec client, date, heures et description.</li><li><strong>G\u00e9n\u00e9rer une facture\u00a0:</strong> S\u00e9lectionnez un client et une p\u00e9riode, d\u00e9finissez un taux horaire, et LedgerLink g\u00e9n\u00e8re une facture PDF professionnelle avec TPS/TVQ sur les honoraires professionnels.</li><li><strong>Exportation\u00a0:</strong> T\u00e9l\u00e9chargez les factures en PDF.</li></ul>"}}
],
